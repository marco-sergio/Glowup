function PatAppointments({user}){
  var _apptsState=useState([]);var appts=_apptsState[0];var setAppts=_apptsState[1];
  var _loadingState=useState(true);var loading=_loadingState[0];var setLoading=_loadingState[1];
  var _reschedModalState=useState(null);var reschedModal=_reschedModalState[0];var setReschedModal=_reschedModalState[1];
  var _newDateState=useState("");var newDate=_newDateState[0];var setNewDate=_newDateState[1];
  var _newTimeState=useState("");var newTime=_newTimeState[0];var setNewTime=_newTimeState[1];
  var _savingState=useState(false);var saving=_savingState[0];var setSaving=_savingState[1];

  var fetchAppts=useCallback(async function(){
    if(!user||!user.id) return;
    setLoading(true);
    var res=await sb.from("appointments")
      .select("*")
      .eq("patient_id",user.id)
      .order("created_at",{ascending:false});
    if(!res.error&&res.data) setAppts(res.data);
    setLoading(false);
  },[user]);

  useEffect(function(){
    fetchAppts();
    // Polling ogni 30 secondi per aggiornamenti in tempo reale
    var interval=setInterval(fetchAppts,30000);
    return function(){clearInterval(interval);};
  },[fetchAppts]);

  var cancelAppt=async function(id){
    await sb.from("appointments").update({status:"cancelled"}).eq("id",id);
    setAppts(function(prev){return prev.map(function(a){return a.id===id?Object.assign({},a,{status:"cancelled"}):a;});});
  };

  var acceptReschedule=async function(a){
    // Accetta la data proposta dal medico
    var notes=a.notes||"";
    var match=notes.match(/Proposta medico: (\S+) alle (\S+)/);
    var nd=match?match[1]:a.date;
    var nt=match?match[2]:a.time;
    await sb.from("appointments").update({status:"confirmed",date:nd,time:nt,notes:""}).eq("id",a.id);
    setAppts(function(prev){return prev.map(function(x){return x.id===a.id?Object.assign({},x,{status:"confirmed",date:nd,time:nt,notes:""}):x;});});
    // Notifica medico via chat
    var threadRes=await sb.from("chat_threads").select("id").eq("patient_id",user.id).eq("doctor_id",a.doctor_id).eq("status","open").limit(1).maybeSingle();
    if(threadRes.data){
      await sb.from("chat_messages").insert({thread_id:threadRes.data.id,sender_type:"patient",sender_id:user.id,content:"Ho accettato la nuova data proposta: "+nd+" alle "+nt+"."});
    }
  };

  var refuseReschedule=async function(a){
    await sb.from("appointments").update({status:"cancelled",notes:"Paziente ha rifiutato la nuova data proposta."}).eq("id",a.id);
    setAppts(function(prev){return prev.map(function(x){return x.id===a.id?Object.assign({},x,{status:"cancelled"}):x;});});
    var threadRes=await sb.from("chat_threads").select("id").eq("patient_id",user.id).eq("doctor_id",a.doctor_id).eq("status","open").limit(1).maybeSingle();
    if(threadRes.data){
      await sb.from("chat_messages").insert({thread_id:threadRes.data.id,sender_type:"patient",sender_id:user.id,content:"Ho rifiutato la nuova data proposta per "+a.service+"."});
    }
  };

  var sendCounterProposal=async function(a){
    if(!newDate||!newTime||saving) return;
    setSaving(true);
    var updRes=await sb.from("appointments").update({status:"pending",notes:"Controproposta paziente: "+newDate+" alle "+newTime}).eq("id",a.id);
    if(updRes.error) console.error("[CounterProposal] update error:",updRes.error);
    else console.log("[CounterProposal] update OK");
    setAppts(function(prev){return prev.map(function(x){return x.id===a.id?Object.assign({},x,{status:"pending",notes:"Controproposta paziente: "+newDate+" alle "+newTime}):x;});});
    var threadRes=await sb.from("chat_threads").select("id").eq("patient_id",user.id).eq("doctor_id",a.doctor_id).eq("status","open").limit(1).maybeSingle();
    if(threadRes.data){
      await sb.from("chat_messages").insert({thread_id:threadRes.data.id,sender_type:"patient",sender_id:user.id,content:"Ho una controproposta per "+a.service+": preferisco il "+newDate+" alle "+newTime+". Va bene?"});
    }
    setReschedModal(null);setNewDate("");setNewTime("");
    setSaving(false);
    // Ricarica appuntamenti dopo breve delay per aggiornare la vista
    setTimeout(fetchAppts, 500);
  };

  // Cerca il nome del medico dall'array DOCTORS tramite supabase_id
  var getDoctorName=function(doctorId){
    var found=DOCTORS.find(function(d){return d.supabase_id===doctorId;});
    return found?found.name:"Medico";
  };
  var getDoctorInitials=function(doctorId){
    var found=DOCTORS.find(function(d){return d.supabase_id===doctorId;});
    return found?found.initials:"MD";
  };
  var getDoctorColor=function(doctorId){
    var found=DOCTORS.find(function(d){return d.supabase_id===doctorId;});
    return found?found.accent:"#c8a96e";
  };

  var upcoming=appts.filter(function(a){return a.status!=="cancelled";});
  var cancelled=appts.filter(function(a){return a.status==="cancelled";});

  if(loading) return <div className="fade-in" style={{textAlign:"center",padding:"3rem"}}><p style={{color:"var(--text3)",fontSize:12}}>Caricamento appuntamenti...</p></div>;

  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <SecTitle title="Appuntamenti" sub="I tuoi appuntamenti"/>
        <button onClick={fetchAppts} style={{padding:"6px 14px",borderRadius:"var(--radius)",background:"var(--bg2)",border:"1px solid var(--border)",color:"var(--text3)",fontSize:11,cursor:"pointer"}}>↻ Aggiorna</button>
      </div>
      {/* Banner avviso proposte in attesa */}
      {appts.some(function(a){return a.notes&&a.notes.startsWith("Proposta medico:");})&&(
        <div className="fade-in" style={{marginBottom:16,padding:"12px 16px",borderRadius:"var(--radius)",background:"rgba(200,169,110,0.12)",border:"1px solid rgba(200,169,110,0.4)",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>🔄</span>
          <p style={{fontSize:13,color:"var(--gold)",fontWeight:600}}>Hai proposte di cambio data in attesa — scorri la lista per accettare, rifiutare o controproporre.</p>
        </div>
      )}

      {appts.length===0&&(
        <Card style={{textAlign:"center",padding:"3rem"}}>
          <p style={{fontSize:28,marginBottom:10}}>📅</p>
          <p style={{color:"var(--text2)",marginBottom:6}}>Nessun appuntamento ancora</p>
          <p style={{fontSize:11,color:"var(--text3)"}}>Prenota una visita dal marketplace</p>
        </Card>
      )}
      {upcoming.length>0&&(
        <div style={{marginBottom:20}}>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",color:"var(--text3)",marginBottom:"0.75rem"}}>PRENOTAZIONI</p>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {upcoming.map(function(a){
              var docName=getDoctorName(a.doctor_id);
              var docIni=getDoctorInitials(a.doctor_id);
              var docCol=getDoctorColor(a.doctor_id);
              var hasDoctorProposal=a.notes&&a.notes.startsWith("Proposta medico:");
              var isResched=a.status==="rescheduled"||hasDoctorProposal;
              var proposedMatch=hasDoctorProposal?a.notes.match(/Proposta medico: (\S+) alle (\S+)/):null;
              var proposedDate=proposedMatch?proposedMatch[1]:null;
              var proposedTime=proposedMatch?proposedMatch[2]:null;
              return(
                <Card key={a.id} style={{border:isResched?"1px solid rgba(200,169,110,0.5)":"1px solid var(--border)",background:isResched?"rgba(200,169,110,0.04)":"var(--surface)"}}>
                  <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                    <Av ini={docIni} sz={46} col={docCol}/>
                    <div style={{flex:1}}>
                      <p style={{fontSize:14,fontWeight:600,marginBottom:2}}>{docName}</p>
                      <p style={{fontSize:12,color:"var(--gold)",fontWeight:600,marginBottom:2}}>{a.service}</p>
                      <p style={{fontSize:11,color:"var(--text2)"}}>📅 {a.date+" alle "+a.time}</p>
                      {isResched&&proposedDate&&(
                        <div style={{marginTop:10,padding:"10px 12px",borderRadius:"var(--radius)",background:"rgba(200,169,110,0.1)",border:"1px solid rgba(200,169,110,0.25)"}}>
                          <p style={{fontSize:11,fontWeight:700,color:"var(--gold)",marginBottom:4}}>🔄 Il medico ha proposto una nuova data</p>
                          <p style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>📅 {proposedDate+" alle "+proposedTime}</p>
                          <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                            <button onClick={function(){acceptReschedule(a);}} style={{padding:"7px 16px",borderRadius:"var(--radius)",background:"var(--teal-dim)",border:"1px solid rgba(45,200,137,0.25)",color:"var(--teal)",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓ Accetta</button>
                            <button onClick={function(){setReschedModal(a);setNewDate("");setNewTime("");}} style={{padding:"7px 16px",borderRadius:"var(--radius)",background:"rgba(200,169,110,0.1)",border:"1px solid rgba(200,169,110,0.3)",color:"var(--gold)",fontSize:12,fontWeight:700,cursor:"pointer"}}>↻ Proponi altra data</button>
                            <button onClick={function(){refuseReschedule(a);}} style={{padding:"7px 16px",borderRadius:"var(--radius)",background:"rgba(196,85,53,0.08)",border:"1px solid rgba(196,85,53,0.2)",color:"#c45535",fontSize:12,fontWeight:700,cursor:"pointer"}}>✕ Rifiuta</button>
                          </div>
                        </div>
                      )}
                    </div>
                    {!isResched&&(
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <span className={"badge "+(a.status==="confirmed"?"badge-green":"badge-gold")}>{a.status==="confirmed"?"✓ Confermato":"In attesa"}</span>
                        <button onClick={function(){cancelAppt(a.id);}} style={{padding:"6px 14px",borderRadius:"var(--radius)",background:"transparent",border:"1px solid var(--coral-dim)",color:"var(--coral)",fontSize:11}} onMouseEnter={function(e){e.currentTarget.style.background="var(--coral-dim)";}} onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}>Cancella</button>
                      </div>
                    )}
                    {isResched&&!proposedDate&&<span className="badge badge-gold">Nuova proposta</span>}
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      )}
      {/* Modal controproposta paziente */}
      {reschedModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div className="fade-in" style={{background:"var(--surface)",borderRadius:"var(--radius-lg)",padding:24,maxWidth:380,width:"100%",border:"1px solid var(--border)"}}>
            <p style={{fontSize:15,fontWeight:700,marginBottom:4}}>Proponi una nuova data</p>
            <p style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>Per {reschedModal.service} con {getDoctorName(reschedModal.doctor_id)}</p>
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              <div style={{flex:1}}>
                <p style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>Data</p>
                <input type="date" value={newDate} onChange={function(e){setNewDate(e.target.value);}} style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:13}}/>
              </div>
              <div style={{flex:1}}>
                <p style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>Orario</p>
                <input type="time" value={newTime} onChange={function(e){setNewTime(e.target.value);}} style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:13}}/>

            </div>
          </div>
        </div>
      )}

      {cancelled.length>0&&(
        <div>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",color:"var(--text3)",marginBottom:"0.75rem"}}>CANCELLATI</p>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {cancelled.map(function(a){
              var docName=getDoctorName(a.doctor_id);
              var docIni=getDoctorInitials(a.doctor_id);
              return(
                <Card key={a.id} style={{display:"flex",gap:14,alignItems:"center",opacity:0.5}}>
                  <Av ini={docIni} sz={46} col="#8c8880"/>
                  <div style={{flex:1}}>
                    <p style={{fontSize:14,fontWeight:600,marginBottom:2}}>{docName}</p>
                    <p style={{fontSize:12,color:"var(--text2)",marginBottom:2}}>{a.service}</p>
                    <p style={{fontSize:11,color:"var(--text3)"}}>📅 {a.date}</p>
                  </div>
                  <span className="badge badge-gray">Cancellato</span>
                </Card>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function AutoStartAnamnesi({lastApptId,doc,user,selService,selDate,selTime,onClose}){
  var timerRef=useRef(null);

  var startNow=useCallback(function(){
    if(timerRef.current) clearTimeout(timerRef.current);
    onClose();
    if(lastApptId) window._startAnamnesi(lastApptId,Object.assign({},doc,{service:selService}),user);
  },[lastApptId,doc,user,selService,onClose]);

  useEffect(function(){
    timerRef.current=setTimeout(function(){
      onClose();
      if(lastApptId) window._startAnamnesi(lastApptId,Object.assign({},doc,{service:selService}),user);
    },2000);
    return function(){if(timerRef.current)clearTimeout(timerRef.current);};
  },[lastApptId,doc,user,selService,onClose]);

  return(
    <div className="fade-in" style={{textAlign:"center",padding:"1rem 0"}}>
      <div style={{fontSize:44,marginBottom:10}}>✓</div>
      <h3 className="serif" style={{fontSize:20,fontWeight:400,marginBottom:8}}>Prenotazione confermata!</h3>
      <p style={{fontSize:12,color:"var(--text2)",lineHeight:1.65,marginBottom:4}}><strong>{selService}</strong> con {doc.name}</p>
      <p style={{fontSize:12,color:"var(--gold)",marginBottom:"1.25rem"}}>{selDate+" alle "+selTime}</p>
      <div style={{background:"var(--gold-light)",border:"1px solid rgba(200,169,110,0.25)",borderRadius:"var(--radius)",padding:"14px 16px",marginBottom:"1.5rem",textAlign:"left"}}>
        <p style={{fontSize:12,fontWeight:700,color:"var(--gold)",marginBottom:6}}>✦ Anamnesi in partenza...</p>
        <p style={{fontSize:11,color:"var(--text2)",lineHeight:1.6,marginBottom:10}}>Gloria ti farà alcune domande per preparare la tua anamnesi. Il medico la riceverà prima della visita.</p>
  
      </div>
      <button onClick={startNow} style={{width:"100%",padding:"13px",borderRadius:99,background:"var(--gold)",border:"none",color:"#fff",fontSize:13,fontWeight:700,boxShadow:"0 2px 12px rgba(200,169,110,0.35)"}}>
        Inizia subito ✦
      </button>
    </div>
  );
}

function AnamnesPage({apptId,doc,user,onClose}){
  var ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanJleml4bGJhcnJ5YWl5aHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4Mjg5MTYsImV4cCI6MjA5NDQwNDkxNn0.HRQZmod5tXe97GXABDyL8QB_YGL6Tf3nccLpbLblWiE";

  // Albero dinamico di domande
  var buildScreens=function(answers){
    var screens=[
      // S0 - Dati anagrafici
      {id:"s0",pairs:[
        {id:"eta",text:"Quanti anni hai?",opts:["Meno di 18","18-25","26-35","36-45","46-55","56-65","Oltre 65"]},
        {id:"sesso",text:"Sesso biologico",opts:["Maschio","Femmina","Preferisco non specificare"]},
      ]},
      // S1 - Motivazione
      {id:"s1",pairs:[
        {id:"motivo",text:"Qual è il motivo principale della visita?",opts:["Miglioramento estetico generale","Correzione zona specifica","Trattamento anti-aging","Consiglio professionale","Altro"]},
        {id:"aspettative",text:"Cosa ti aspetti dal trattamento?",opts:["Risultato naturale e discreto","Cambiamento evidente","Mantenere risultati precedenti","Voglio solo capire le opzioni","Altro"]},
      ]},
      // S2 - Trattamenti precedenti
      {id:"s2",pairs:[
        {id:"trattamenti_prec",text:"Hai già fatto trattamenti estetici in passato?",opts:["No, prima volta","Sì — filler o botox","Sì — laser o peeling","Sì — intervento chirurgico","Altro"]},
        {id:"motivo_scelta",text:"Come hai scelto di intraprendere questo percorso?",opts:["Consiglio di amici o familiari","Ricerca online","Consiglio del medico di base","Esperienza personale precedente","Altro"]},
      ]},
    ];

    // S2b - Soddisfazione solo se ha fatto trattamenti
    var prevTratt=answers["trattamenti_prec"];
    if(prevTratt&&prevTratt!=="No, prima volta"){
      screens.push({id:"s2b",pairs:[
        {id:"soddisfazione",text:"Sei soddisfatto/a dei risultati dei trattamenti precedenti?",opts:["Molto soddisfatto/a","Abbastanza soddisfatto/a","Poco soddisfatto/a","Insoddisfatto/a","Altro"]},
        {id:"trattamenti_dettaglio",text:"Vuoi descrivere i trattamenti fatti e quando?",opts:["Meno di 1 anno fa","1-3 anni fa","Più di 3 anni fa","Non ricordo con precisione","Altro"],freeText:true},
      ]});
    }

    // S3 - Malattie (sempre)
    screens.push({id:"s3",pairs:[
      {id:"malattie",text:"Hai condizioni mediche o malattie croniche?",opts:["No, sono in buona salute","Diabete o problemi metabolici","Problemi cardiovascolari","Disturbi autoimmuni o tiroidei","Altro"]},
      {id:"interventi",text:"Hai mai subito interventi chirurgici?",opts:["No","Sì — intervento estetico","Sì — intervento generale","Sì — entrambi","Altro"]},
    ]});

    // S4 - Complicazioni chirurgiche (solo se ha avuto interventi)
    var prevInterventi=answers["interventi"];
    if(prevInterventi&&prevInterventi!=="No"){
      screens.push({id:"s4",pairs:[
        {id:"complicazioni",text:"Hai avuto complicazioni durante o dopo gli interventi?",opts:["No, nessuna","Problemi di cicatrizzazione","Reazioni all'anestesia","Infezioni post-operatorie","Altro"]},
        {id:"anestesia",text:"Hai mai avuto reazioni avverse all'anestesia?",opts:["No","Sì — nausea o vomito","Sì — reazione allergica","Non so","Altro"]},
      ]});
    }

    // S5 - Farmaci (sempre)
    screens.push({id:"s5",pairs:[
      {id:"farmaci",text:"Stai assumendo farmaci o integratori?",opts:["No","Sì"]},
      {id:"allergie",text:"Hai allergie note?",opts:["No","Sì — allergie a farmaci","Sì — allergie a materiali o lattice","Sì — allergie alimentari rilevanti","Altro"]},
    ]});

    // S6 - Dettaglio farmaci (solo se sì)
    var prendeFarmaci=answers["farmaci"];
    if(prendeFarmaci==="Sì"){
      screens.push({id:"s6",pairs:[
        {id:"farmaci_tipo",text:"Che tipo di farmaci assumi?",opts:["Anticoagulanti o antiaggreganti","Immunosoppressori","Ormoni o contraccettivi","Antidepressivi o psicofarmaci","Altro"],freeText:true},
        {id:"integratori",text:"Assumi integratori o vitamine?",opts:["No","Vitamina E o omega 3","Integratori a base di erbe","Antiossidanti","Altro"],freeText:true},
      ]});
    }

    // S7 - Stile di vita (sempre)
    screens.push({id:"s7",pairs:[
      {id:"fumo",text:"Fumi o hai fumato?",opts:["No, non fumo","Sì — meno di 10 sigarette/giorno","Sì — più di 10 sigarette/giorno","Ex fumatore/fumatrice","Altro"]},
      {id:"alcol",text:"Consumi alcolici regolarmente?",opts:["No o raramente","Sì — qualche volta a settimana","Sì — tutti i giorni","Altro"]},
    ]});

    // S8 - Gravidanza (solo se femmina)
    var sesso=answers["sesso"];
    if(!sesso||sesso==="Femmina"){
      screens.push({id:"s8",pairs:[
        {id:"gravidanza",text:"Sei in gravidanza o stai allattando?",opts:["No","Sì — sono in gravidanza","Sì — sto allattando","Sto pianificando una gravidanza","Non applicabile"]},
        {id:"ciclo",text:"Hai irregolarità ormonali o problemi ginecologici rilevanti?",opts:["No","Sì — menopausa","Sì — endometriosi o PCOS","Sì — terapia ormonale","Altro"]},
      ]});
    }

    return screens;
  };

  var _answersState=useState({});var answers=_answersState[0];var setAnswers=_answersState[1];
  var _customState=useState({});var custom=_customState[0];var setCustom=_customState[1];
  var _screenIdxState=useState(0);var screenIdx=_screenIdxState[0];var setScreenIdx=_screenIdxState[1];
  var _doneState=useState(false);var done=_doneState[0];var setDone=_doneState[1];
  var _sendingState=useState(false);var sending=_sendingState[0];var setSending=_sendingState[1];

  var screens=buildScreens(answers);
  var currentScreen=screens[screenIdx];
  var q1=currentScreen.pairs[0];
  var q2=currentScreen.pairs[1];
  var canProceed=answers[q1.id]&&answers[q2.id];
  var isLast=screenIdx===screens.length-1;

  var setAnswer=function(qid,opt){
    var newAnswers=Object.assign({},answers);
    newAnswers[qid]=opt;
    setAnswers(newAnswers);
    if(opt!=="Altro") setCustom(function(p){var n=Object.assign({},p);delete n[qid];return n;});
  };

  var handleNext=function(){
    if(!canProceed) return;
    var newScreens=buildScreens(answers);
    if(screenIdx<newScreens.length-1) setScreenIdx(function(i){return i+1;});
  };

  var generatePDF=function(){
    var jsPDF=window.jspdf.jsPDF;
    var pdoc=new jsPDF();
    var y=20;
    pdoc.setFontSize(18);
    pdoc.setTextColor(200,169,110);
    pdoc.text("GlowUp — Documento Anamnesi",20,y); y+=10;
    pdoc.setFontSize(11);
    pdoc.setTextColor(80,80,80);
    pdoc.text("Paziente: "+user.name,20,y); y+=6;
    pdoc.text("Medico: "+doc.name+" ("+doc.specialty+")",20,y); y+=6;
    pdoc.text("Servizio: "+(doc.service||""),20,y); y+=6;
    pdoc.text("Generato: "+new Date().toLocaleDateString("it-IT"),20,y); y+=10;
    pdoc.setDrawColor(200,169,110);
    pdoc.line(20,y,190,y); y+=8;
    var finalScreens=buildScreens(answers);
    finalScreens.forEach(function(sc){
      sc.pairs.forEach(function(q){
        var ans=answers[q.id]||"Non risposto";
        if(ans==="Altro"&&custom[q.id]) ans="Altro: "+custom[q.id];
        pdoc.setFontSize(11);
        pdoc.setFont(undefined,"bold");
        pdoc.setTextColor(30,30,30);
        var qlines=pdoc.splitTextToSize(q.text,170);
        qlines.forEach(function(l){pdoc.text(l,20,y);y+=6;});
        pdoc.setFont(undefined,"normal");
        pdoc.setTextColor(80,80,80);
        var alines=pdoc.splitTextToSize(ans,160);
        alines.forEach(function(l){pdoc.text(l,25,y);y+=6;});
        y+=3;
        if(y>270){pdoc.addPage();y=20;}
      });
    });
    return pdoc;
  };

  var handleFinish=useCallback(async function(){
    if(!canProceed||sending) return;
    setSending(true);
    var pdoc=generatePDF();
    pdoc.save("anamnesi_"+user.name.replace(/ /g,"_")+".pdf");
    var finalScreens=buildScreens(answers);
    var docLines=[];
    finalScreens.forEach(function(sc){
      sc.pairs.forEach(function(q){
        var ans=answers[q.id]||"Non risposto";
        if(ans==="Altro"&&custom[q.id]) ans="Altro: "+custom[q.id];
        docLines.push(q.text+" -> "+ans);
      });
    });
    var docText=docLines.join(", ");
    // Salva anamnesi — prima elimina eventuale record esistente, poi inserisce
    await sb.from("anamnesi").delete().eq("appointment_id",apptId);
    var anamRes=await sb.from("anamnesi").insert({
      appointment_id:apptId,
      patient_id:user.id,
      doctor_id:doc.supabase_id||doc.id,
      chat_history:docLines,
      documento:docText,
      completata:true,
    });
    if(anamRes.error) console.error("[Anamnesi] save error:", anamRes.error);
    var patProf=await sb.from("profiles").select("email").eq("id",user.id).single();
    var docProf=await sb.from("profiles").select("email").eq("id",doc.supabase_id).single();
    var patEmail=patProf.data?patProf.data.email:"";
    var docEmail=docProf.data?docProf.data.email:"";
    var pdfB64=pdoc.output("datauristring").split(",")[1];
    await fetch("https://tmjrezixlbarryaiyhpg.supabase.co/functions/v1/anamnesi",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON},
      body:JSON.stringify({action:"send_email",data:{patientEmail:patEmail,doctorEmail:docEmail,patientName:user.name,doctorName:doc.name,service:doc.service||"",date:doc.date||"",pdfBase64:pdfB64}})
    });
    setSending(false);
    setDone(true);
    setTimeout(function(){onClose();},3000);
  },[canProceed,sending,answers,custom,user,doc,apptId,onClose]);

  if(done) return(
    <div style={{position:"fixed",inset:0,background:"var(--bg)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
      <div className="scale-in" style={{maxWidth:480,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:16}}>✦</div>
        <h2 className="serif" style={{fontSize:28,fontWeight:400,marginBottom:8}}>Anamnesi completata!</h2>
        <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,marginBottom:8}}>Il PDF è stato scaricato e inviato via email a te e a {doc.name}.</p>
        <p style={{fontSize:11,color:"var(--text3)"}}>Verrai reindirizzato tra pochi secondi...</p>
      </div>
    </div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"var(--bg)",zIndex:500,display:"flex",flexDirection:"column"}}>
      <div style={{background:"var(--bg3)",borderBottom:"1px solid var(--border)",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,var(--gold),var(--gold-dim))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#fff"}}>G</div>
        <div style={{flex:1}}>
          <p style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>Anamnesi · {doc.service||doc.specialty}</p>
          <p style={{fontSize:10,color:"var(--text3)"}}>Visita con {doc.name}</p>
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          {screens.map(function(_,i){return <div key={i} style={{width:i===screenIdx?16:6,height:4,borderRadius:99,background:i<=screenIdx?"var(--gold)":"var(--border)",transition:"all .3s"}}/>;} )}
          <span style={{fontSize:11,color:"var(--text3)",marginLeft:6}}>{screenIdx+1}/{screens.length}</span>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"24px 20px",maxWidth:640,width:"100%",margin:"0 auto"}}>
        {[q1,q2].map(function(q,qi){return(
          <div key={q.id} style={{marginBottom:qi===0?"2rem":"0"}}>
            <p style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:"1rem",lineHeight:1.4}}>{q.text}</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {q.opts.map(function(opt){
                var sel=answers[q.id]===opt;
                return(
                  <button key={opt} onClick={function(){setAnswer(q.id,opt);}}
                    style={{padding:"11px 16px",borderRadius:"var(--radius)",border:"1.5px solid "+(sel?"var(--gold)":"var(--border2)"),background:sel?"var(--gold-light)":"var(--surface)",color:sel?"var(--gold-dim)":"var(--text)",fontSize:13,textAlign:"left",fontWeight:sel?600:400,transition:"all .15s",display:"flex",alignItems:"center",gap:10}}
                    onMouseEnter={function(e){if(!sel){e.currentTarget.style.borderColor="var(--gold)";e.currentTarget.style.background="var(--bg2)";}}}
                    onMouseLeave={function(e){if(!sel){e.currentTarget.style.borderColor="var(--border2)";e.currentTarget.style.background="var(--surface)";}}}
                  >
                    <div style={{width:18,height:18,borderRadius:"50%",border:"2px solid "+(sel?"var(--gold)":"var(--border2)"),background:sel?"var(--gold)":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {sel&&<div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}/>}
                    </div>
                    {opt}
                  </button>
                );
              })}
              {answers[q.id]==="Altro"&&(
                <input value={custom[q.id]||""} onChange={function(e){setCustom(function(p){var n=Object.assign({},p);n[q.id]=e.target.value;return n;});}}
                  placeholder="Specifica..." className="inp" style={{marginTop:4}}/>
              )}
              {q.freeText&&answers[q.id]&&answers[q.id]!=="No"&&answers[q.id]!=="Altro"&&(
                <input value={custom[q.id]||""} onChange={function(e){setCustom(function(p){var n=Object.assign({},p);n[q.id]=e.target.value;return n;});}}
                  placeholder="Vuoi specificare? (opzionale)" className="inp" style={{marginTop:4}}/>
              )}
            </div>
          </div>
        );})}
      </div>
      <div style={{borderTop:"1px solid var(--border)",padding:"14px 20px",background:"var(--bg3)",flexShrink:0}}>
        <div style={{maxWidth:640,margin:"0 auto",display:"flex",gap:8}}>
          {screenIdx>0&&(
            <button onClick={function(){setScreenIdx(function(i){return i-1;});}}
              style={{padding:"13px 20px",borderRadius:99,background:"transparent",border:"1px solid var(--border)",color:"var(--text2)",fontSize:13,fontWeight:600}}>
              ←
            </button>
          )}
          {!isLast?(
            <button onClick={handleNext} disabled={!canProceed}
              style={{flex:1,padding:"13px",borderRadius:99,background:canProceed?"var(--gold)":"var(--bg2)",border:"none",color:canProceed?"#fff":"var(--text3)",fontSize:13,fontWeight:700,transition:"all .2s"}}>
              {"Continua "+(screenIdx+1)+"/"+screens.length+" →"}
            </button>
          ):(
            <button onClick={handleFinish} disabled={!canProceed||sending}
              style={{flex:1,padding:"13px",borderRadius:99,background:canProceed&&!sending?"var(--gold)":"var(--bg2)",border:"none",color:canProceed&&!sending?"#fff":"var(--text3)",fontSize:13,fontWeight:700}}>
              {sending?"Generazione PDF...":(screens.length+"/"+screens.length+" — Completa e invia ✦")}
            </button>
          )}
        </div>
        {!canProceed&&<p style={{textAlign:"center",fontSize:10,color:"var(--text3)",marginTop:6}}>Rispondi a entrambe le domande per continuare</p>}
      </div>
    </div>
  );
}



// ─── MOBILE APP ROOT ───────────────────────────────────────────────

function App(){
  var _pageState=useState("home");var page=_pageState[0];var setPage=_pageState[1];
  var _docPageState=useState(null);var docPage=_docPageState[0];var setDocPage=_docPageState[1];

  // Hash-based routing for doctor pages
  useEffect(function(){
    var handleHash=function(){
      var hash=window.location.hash;
      if(hash.startsWith("#/medico/")){
        var id=hash.replace("#/medico/","");
        setDocPage(id);
      } else {
        setDocPage(null);
      }
    };
    handleHash();
    window.addEventListener("hashchange",handleHash);
    return function(){window.removeEventListener("hashchange",handleHash);};
  },[]);

  var openDoctorPage=function(doc){
    var slug=doc.id||(doc.name||"").toLowerCase().replace(/[^a-z0-9]+/g,"-");
    window.location.hash="#/medico/"+slug;
    window._currentDocId=doc.id;
  };

  var closeDoctorPage=function(){
    window.location.hash="";
    window._currentDocId=null;
  };
  var _userState=useState(null);var user=_userState[0];var setUser=_userState[1];
  var _uiState=useState({heroTitle:null,heroSubtitle:null,highlightedDoctorIds:[],filterTags:[],filterCity:null,contextNote:null,suggestions:[]});var ui=_uiState[0];var setUi=_uiState[1];
  var _bookDocState=useState(null);var bookDoc=_bookDocState[0];var setBookDoc=_bookDocState[1];
  var _viewDocState=useState(null);var viewDoc=_viewDocState[0];var setViewDoc=_viewDocState[1];
  var _authCheckedState=useState(false);var authChecked=_authCheckedState[0];var setAuthChecked=_authCheckedState[1];
  var _anamnesState=useState(null);var anamnesData=_anamnesState[0];var setAnamnesData=_anamnesState[1];

  // Handler globale per aprire la pagina anamnesi
  window._startAnamnesi=function(apptId,doc,user){
    setAnamnesData({apptId:apptId,doc:doc,user:user});
  };

  // Handler globale per aprire chat
  var _chatTargetState=useState(null);var chatTarget=_chatTargetState[0];var setChatTarget=_chatTargetState[1];
  window._openChat=function(doctorId,doctorName){
    setChatTarget({doctorId:doctorId,doctorName:doctorName});
    setPage("dashboard");
  };
  window._currentUser=user;
  const updUi=useCallback(function(u){setUi(function(p){var n={};Object.keys(p).forEach(function(k){n[k]=p[k];});Object.keys(u).forEach(function(k){n[k]=u[k];});return n;});},[]);

  // Controlla sessione esistente al caricamento
  useEffect(function(){
    sb.auth.getSession().then(async function(res){
      if(res.data.session){
        var uid=res.data.session.user.id;
        var prof=await sb.from("profiles").select("*").eq("id",uid).single();
        if(prof.data){
          var p=prof.data;
          var ini=p.name.split(" ").map(function(n){return n[0];}).join("").slice(0,2).toUpperCase();
          setUser({name:p.name,initials:ini,type:p.type,id:uid});
          setPage("dashboard");
        }
      }
      setAuthChecked(true);
    });
  },[]);

  var login=function(u){setUser(u);setPage("dashboard");};
  var logout=async function(){await sb.auth.signOut();setUser(null);setPage("home");};
  window._logout=logout;

  if(!authChecked) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg)"}}><div style={{textAlign:"center"}}><div style={{fontSize:28,marginBottom:12}}>✦</div><p style={{color:"var(--text3)",fontSize:12}}>Caricamento...</p></div></div>;


  // Anamnesi ha sempre priorità massima
  if(anamnesData) return <AnamnesPage apptId={anamnesData.apptId} doc={anamnesData.doc} user={anamnesData.user} onClose={function(){setAnamnesData(null);}}/>;

  // Doctor page route (hash-based)
  if(docPage){
    return <DoctorPage
      docId={window._currentDocId||docPage}
      onBook={function(doc){setBookDoc(doc);}}
      onBack={closeDoctorPage}/>;
  }

  if(!user&&["home","info","fordoctors"].includes(page)){
    return <div className="layout">
      <Header user={null} onLogout={logout} nav={setPage} cur={page}/>
      <main className="layout-main"><Marketplace uiState={ui} onBook={setBookDoc} onView={openDoctorPage}/></main>
      <aside className="layout-chat"><Gloria onUpdate={updUi} ctx="marketplace" doctors={[]} /></aside>
      {bookDoc&&<BookModal doc={bookDoc} onClose={()=>setBookDoc(null)} user={user}/>}
    </div>;
  }

  if(page==="login") return <div style={{display:"flex",flexDirection:"column",height:"100vh"}}><Header user={null} onLogout={logout} nav={setPage} cur="login"/><LoginPage onLogin={login} nav={setPage}/></div>;
  if(page==="register") return <div style={{display:"flex",flexDirection:"column",height:"100vh"}}><Header user={null} onLogout={logout} nav={setPage} cur="register"/><RegisterPage onLogin={login} nav={setPage}/></div>;
  if(user&&page==="dashboard") return user.type==="doctor"?<DocDashboard user={user}/>:<PatDashboard user={user} nav={setPage} uiState={ui} onUiUpdate={updUi} bookDoc={bookDoc} setBookDoc={setBookDoc} viewDoc={viewDoc} setViewDoc={setViewDoc} chatTarget={chatTarget} onChatOpen={function(){setChatTarget(null);}}/>;
  return null;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
