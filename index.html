html,body,#root{height:100%;overflow:hidden}

button{cursor:pointer;font-family:'Syne',sans-serif}
input,textarea,select{font-family:'Syne',sans-serif;outline:none}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes gloriaGlow{0%,100%{box-shadow:0 0 0 0 rgba(200,169,110,0)}50%{box-shadow:0 0 20px 4px rgba(200,169,110,0.25)}}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.slide-in{animation:slideIn 0.35s ease forwards}
.fade-in{animation:fadeIn 0.4s ease forwards}

.layout{display:grid;grid-template-columns:1fr var(--chat-w);grid-template-rows:52px 1fr;height:100vh;width:100vw}
.layout-header{grid-column:1/-1;grid-row:1}
.layout-main{grid-column:1;grid-row:2;overflow:hidden;display:flex;flex-direction:column}
.layout-chat{grid-column:2;grid-row:2;border-left:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}

.layout-full .layout-content{grid-column:2;grid-row:2;overflow-y:auto}

}

function MapView({locations,height}){
  var mapIdRef=useRef("map-"+Math.random().toString(36).slice(2));
  var mapInstanceRef=useRef(null);

  useEffect(function(){
    if(!locations||locations.length===0) return;
    if(typeof L==="undefined") return;
    var timer=setTimeout(function(){
      var el=document.getElementById(mapIdRef.current);
      if(!el) return;
      if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;}
      mapInstanceRef.current=L.map(el,{zoomControl:true,scrollWheelZoom:false});
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>",maxZoom:19,crossOrigin:true}).addTo(mapInstanceRef.current);
      var map=mapInstanceRef.current;
      var pin=async function(loc){
        var q=loc.address?loc.address+", "+loc.city:loc.city+", Italia";
        try{
          var q=loc.address?loc.address+", "+loc.city:loc.city+", Italia";
          var r=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(q),{headers:{"Accept-Language":"it","User-Agent":"GlowUp-App/1.0 glowupdemo.netlify.app"}});
          var d=await r.json();
          if(d&&d.length>0){
            var lat=parseFloat(d[0].lat),lon=parseFloat(d[0].lon);
            var ico=L.divIcon({className:"",html:'<div style="width:18px;height:18px;background:#c8a96e;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.35)"></div>',iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-12]});
            L.marker([lat,lon],{icon:ico}).addTo(map).bindPopup("<strong>"+loc.name+"</strong><br>"+loc.city+(loc.address?"<br>"+loc.address:""));
            return [lat,lon];
          }
        }catch(e){}
        return null;
      };
      var load=async function(){
        var coords=[];
        for(var i=0;i<locations.length;i++){
          var loc=locations[i];
          // Usa coordinate salvate se disponibili, altrimenti geocoding
          if(loc.lat&&loc.lon){
            var lat=loc.lat,lon=loc.lon;
            var ico=L.divIcon({className:"",html:'<div style="width:18px;height:18px;background:#c8a96e;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.35)"></div>',iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-12]});
            L.marker([lat,lon],{icon:ico}).addTo(map).bindPopup("<strong>"+loc.name+"</strong><br>"+loc.city+(loc.address?"<br>"+loc.address:""));
            coords.push([lat,lon]);
          }else{
            var c=await pin(loc);
            if(c)coords.push(c);
            if(i<locations.length-1) await new Promise(function(r){setTimeout(r,1100);});
          }
        }
        if(coords.length===1) map.setView(coords[0],14);
        else if(coords.length>1) map.fitBounds(coords,{padding:[30,30]});
        setTimeout(function(){map.invalidateSize();},100);
      };
      load().then(function(){if(mapInstanceRef.current)mapInstanceRef.current.invalidateSize();});
    },500);
    return function(){clearTimeout(timer);};
  },[locations]);

  useEffect(function(){
    return function(){if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;}};
  },[]);

  return <div id={mapIdRef.current} style={{width:"100%",height:height||220,borderRadius:"var(--radius-lg)",overflow:"hidden",border:"1px solid var(--border)",marginBottom:"1rem",zIndex:1}}/>;
}

function BookModal({doc,onClose,user}){
  var stepState=useState(0);var step=stepState[0];var setStep=stepState[1];
  var svcState=useState("");var selService=svcState[0];var setSelService=svcState[1];
  var locState=useState(null);var selLocation=locState[0];var setSelLocation=locState[1];
  var dateState=useState("");var selDate=dateState[0];var setSelDate=dateState[1];
  var timeState=useState("");var selTime=timeState[0];var setSelTime=timeState[1];
  var locsState=useState([]);var locations=locsState[0];var setLocations=locsState[1];
  var avState=useState([]);var availability=avState[0];var setAvailability=avState[1];
  var savingState=useState(false);var saving=savingState[0];var setSaving=savingState[1];
  var lastApptIdState=useState(null);var lastApptId=lastApptIdState[0];var setLastApptId=lastApptIdState[1];
  var consentState=useState(null);var consent=consentState[0];var setConsent=consentState[1];
  var showDenyState=useState(false);var showDeny=showDenyState[0];var setShowDeny=showDenyState[1];
  var errState=useState("");var err=errState[0];var setErr=errState[1];

  var DAYS=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];

  useEffect(function(){
    if(!doc||!doc.supabase_id) return;
    var load=async function(){
      var locRes=await sb.from("doctor_locations").select("*").eq("doctor_id",doc.supabase_id);
      var avRes=await sb.from("doctor_availability").select("*").eq("doctor_id",doc.supabase_id);
      if(!locRes.error) setLocations(locRes.data||[]);
      if(!avRes.error) setAvailability(avRes.data||[]);
    };
    load();
  },[doc]);

  var getAvailableDates=function(locationId){
    var locObj=locations.find(function(l){return l.id===locationId;});
    var useGlobal=!locObj||!locObj.has_own_calendar;
    var relevantAv=availability.filter(function(a){
      if(useGlobal) return !a.location_id;
      return a.location_id===locationId;
    });
    if(relevantAv.length===0) return [];
    var activeDays=relevantAv.map(function(a){return a.day_of_week;});
    var dates=[];
    var today=new Date();
    for(var i=1;i<=28;i++){
      var d=new Date(today);
      d.setDate(today.getDate()+i);
      var dow=d.getDay();
      var adjusted=dow===0?6:dow-1;
      if(activeDays.includes(adjusted)){
        var av=relevantAv.find(function(a){return a.day_of_week===adjusted;});
        dates.push({
          label:DAYS[adjusted]+" "+d.getDate()+"/"+(d.getMonth()+1),
          dateStr:d.toISOString().split("T")[0],
          timeStart:av?av.time_start:"09:00",
          timeEnd:av?av.time_end:"18:00",
        });
      }
      if(dates.length>=6) break;
    }
    return dates;
  };

  var getTimeSlots=function(timeStart,timeEnd){
    var slots=[];
    var start=parseInt(timeStart.split(":")[0]);
    var end=parseInt(timeEnd.split(":")[0]);
    for(var h=start;h<end;h++){
      slots.push(h+":00");
      if(h<end-1) slots.push(h+":30");
    }
    return slots;
  };

  var confirmBooking=useCallback(async function(){
    if(!selService||!selDate||!selTime){setErr("Compila tutti i campi");return;}
    var patientId=user&&user.id?user.id:null;
    if(!patientId){setErr("Devi essere loggato per prenotare");return;}
    if(!doc.supabase_id){setErr("Questo medico e in modalita demo");return;}
    setSaving(true);setErr("");
    var locName=null;
    if(selLocation){
      var locObj=locations.find(function(l){return l.id===selLocation;});
      if(locObj) locName=locObj.name;
    }
    var res=await sb.from("appointments").insert({
      patient_id:patientId,
      doctor_id:doc.supabase_id,
      service:selService,
      date:selDate,
      time:selTime,
      status:"pending",
      location_id:selLocation||null,
      location_name:locName,
      notes:""
    });
    setSaving(false);
    if(res.error){setErr(res.error.message);return;}
    // Salva l'ID appuntamento creato
    var apptData=await sb.from("appointments").select("id").eq("patient_id",patientId).eq("doctor_id",doc.supabase_id).order("created_at",{ascending:false}).limit(1).single();
    if(apptData.data) setLastApptId(apptData.data.id);
    setStep(4);
  },[selService,selDate,selTime,selLocation,user,doc,locations]);

  var availDates=selLocation?getAvailableDates(selLocation):[];
  var selDateObj=availDates.find(function(d){return d.dateStr===selDate;});
  var timeSlots=selDateObj?getTimeSlots(selDateObj.timeStart,selDateObj.timeEnd):[];

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(26,24,20,0.65)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}} onClick={onClose}>
      <div onClick={function(e){e.stopPropagation();}} className="scale-in" style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:"var(--radius-lg)",padding:"1.75rem",maxWidth:460,width:"100%",maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"1.25rem",alignItems:"center"}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}><Av ini={doc.initials} sz={44} col={doc.accent}/><div><p style={{fontWeight:600,fontSize:14}}>{doc.name}</p><p style={{fontSize:11,color:"var(--text2)"}}>{doc.specialty+" · "+doc.city}</p></div></div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,color:"var(--text3)"}}>✕</button>
        </div>
        <div style={{display:"flex",gap:4,marginBottom:"1.25rem"}}>
          {["Privacy","Servizio","Sede","Data & Ora","Conferma"].map(function(s,i){
            return <div key={s} style={{flex:1,height:3,borderRadius:99,background:i<step?"var(--gold)":"var(--border)",transition:"background .3s"}}/>;
          })}
        </div>
        {step===0&&<div className="fade-in">
          <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:"1rem"}}>
            <span style={{fontSize:24,flexShrink:0}}>🔒</span>
            <div>
              <p style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:4}}>Informativa sulla privacy</p>
              <p style={{fontSize:11,color:"var(--text3)"}}>Ai sensi del Reg. UE 2016/679 (GDPR) e della LPD svizzera</p>
            </div>
          </div>
          <div style={{background:"var(--bg2)",borderRadius:"var(--radius)",padding:"14px 16px",marginBottom:"1rem",maxHeight:220,overflowY:"auto",border:"1px solid var(--border)"}}>
            <p style={{fontSize:11,color:"var(--text2)",lineHeight:1.8}}>
              {"Titolare del trattamento: GlowUp S.r.l. — Il trattamento dei Suoi dati personali avviene nel rispetto del Regolamento (UE) 2016/679 (GDPR) e, ove applicabile, della Legge federale svizzera sulla protezione dei dati (LPD)."}
            </p>
            <p style={{fontSize:11,color:"var(--text2)",lineHeight:1.8,marginTop:8}}>
              {"Finalità del trattamento: I dati personali forniti (dati anagrafici, contatti, informazioni sanitarie raccolte tramite il questionario anamnestico) saranno trattati esclusivamente per:"}
            </p>
            <ul style={{paddingLeft:16,marginTop:4}}>
              {["Gestione della prenotazione e della visita medica","Trasmissione dei dati al professionista sanitario scelto","Comunicazioni relative all'appuntamento","Adempimento di obblighi di legge"].map(function(item){return <li key={item} style={{fontSize:11,color:"var(--text2)",lineHeight:1.8}}>{item}</li>;})}
            </ul>
            <p style={{fontSize:11,color:"var(--text2)",lineHeight:1.8,marginTop:8}}>
              {"Destinatari: I dati saranno comunicati esclusivamente al professionista sanitario selezionato per la gestione della visita. Nessun dato sarà ceduto a terzi per finalità commerciali."}
            </p>
            <p style={{fontSize:11,color:"var(--text2)",lineHeight:1.8,marginTop:8}}>
              {"Conservazione: I dati saranno conservati per il periodo necessario all'erogazione del servizio e per gli obblighi di legge (max 10 anni per dati sanitari)."}
            </p>
            <p style={{fontSize:11,color:"var(--text2)",lineHeight:1.8,marginTop:8}}>
              {"Diritti: Lei ha diritto di accesso, rettifica, cancellazione, limitazione del trattamento e portabilità dei dati. Può esercitare tali diritti scrivendo a privacy@glowup.it"}
            </p>
          </div>
          {showDeny&&(
            <div className="fade-in" style={{background:"var(--coral-dim)",border:"1px solid rgba(196,85,53,0.25)",borderRadius:"var(--radius)",padding:"12px 14px",marginBottom:"1rem"}}>
              <p style={{fontSize:12,fontWeight:600,color:"var(--coral)",marginBottom:4}}>⚠ Consenso necessario</p>

function LoginPage({onLogin,nav}){
  var _roleState=useState("patient");var role=_roleState[0];var setRole=_roleState[1];
  var _emailState=useState("");var email=_emailState[0];var setEmail=_emailState[1];
  var _passwordState=useState("");var password=_passwordState[0];var setPassword=_passwordState[1];
  var _errState=useState("");var err=_errState[0];var setErr=_errState[1];
  var _busyState=useState(false);var busy=_busyState[0];var setBusy=_busyState[1];

  var handleLogin=useCallback(async function(){
    if(!email||!password){setErr("Compila email e password");return;}
    setBusy(true);setErr("");
    var res=await sb.auth.signInWithPassword({email:email,password:password});
    if(res.error){setErr(res.error.message);setBusy(false);return;}
    var uid=res.data.user.id;
    var prof=await sb.from("profiles").select("*").eq("id",uid).single();
    if(prof.error||!prof.data){setErr("Profilo non trovato. Registrati prima.");setBusy(false);return;}
    var p=prof.data;
    var ini=p.name.split(" ").map(function(n){return n[0];}).join("").slice(0,2).toUpperCase();
    onLogin({name:p.name,initials:ini,type:p.type,id:uid});
    setBusy(false);
  },[email,password,onLogin]);

  return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:"2rem"}}>
      <div className="scale-in" style={{width:"100%",maxWidth:380}}>

          <div style={{display:"inline-flex",alignItems:"baseline",gap:2,marginBottom:8}}><span className="serif" style={{fontSize:30,color:"var(--gold)",fontStyle:"italic"}}>Glow</span><span className="serif" style={{fontSize:30,color:"var(--text)"}}>Up</span></div>
          <p style={{fontSize:13,color:"var(--text2)"}}>Accedi al tuo account</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:"1.5rem"}}>
          {[["patient","🧑‍💼","Sono un Paziente"],["doctor","🩺","Sono un Medico"]].map(([r,icon,label])=>(
            <button key={r} onClick={()=>setRole(r)} style={{padding:"14px",borderRadius:"var(--radius-lg)",border:"1.5px solid "+(role===r?"var(--gold)":"var(--border)"),background:role===r?"var(--gold-light)":"var(--surface)",color:role===r?"var(--gold)":"var(--text2)",textAlign:"center",transition:"all .15s"}}>
              <div style={{fontSize:22,marginBottom:4}}>{icon}</div><p style={{fontSize:11,fontWeight:600}}>{label}</p>
            </button>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1rem"}}>
          <div><label className="label">EMAIL</label><input type="email" value={email} onChange={function(e){setEmail(e.target.value);}} placeholder="la-tua@email.com" className="inp"/></div>
          <div><label className="label">PASSWORD</label><input type="password" value={password} onChange={function(e){setPassword(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleLogin();}} placeholder="••••••••" className="inp"/></div>
        </div>
        {err&&<p style={{fontSize:11,color:"var(--coral)",marginBottom:8,textAlign:"center"}}>{err}</p>}
        <button onClick={handleLogin} disabled={busy}
          style={{width:"100%",padding:"13px",borderRadius:"var(--radius)",background:busy?"var(--bg3)":"var(--gold)",border:"none",color:busy?"var(--text3)":"#fff",fontSize:13,fontWeight:700,marginBottom:"1rem"}}>

        <p style={{textAlign:"center",fontSize:12,color:"var(--text3)"}}>Non hai un account? <button onClick={()=>nav("register")} style={{background:"none",border:"none",color:"var(--gold)",fontSize:12,cursor:"pointer",fontWeight:600}}>Registrati</button></p>
      </div>
    </div>
  );
}

function DocOverview({user}){

        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {appts.map(function(a){
            var pName=a.patient&&a.patient.name?a.patient.name:"Paziente";
            var ini=pName.split(" ").map(function(n){return n[0];}).join("").slice(0,2).toUpperCase();
            return(
              <div key={a.id} style={{display:"flex",gap:10,alignItems:"center",padding:"8px 10px",borderRadius:"var(--radius)",background:"var(--bg2)"}}>
                <Av ini={ini} sz={32} col="#c8a96e"/>

                  <p style={{fontSize:12,fontWeight:600}}>{pName}</p>
                  <p style={{fontSize:10,color:"var(--text3)"}}>{a.service}</p>
                </div>
                <div style={{textAlign:"right"}}>
                  <p style={{fontSize:11,color:"var(--text2)"}}>{a.date}</p>
                  <span className={"badge "+(a.status==="confirmed"?"badge-green":a.status==="pending"?"badge-gold":"badge-gray")}>{a.status==="confirmed"?"✓ Confermato":a.status==="pending"?"In attesa":"Annullato"}</span>
                </div>
              </div>
            );

        </div>
      </Card>
    </div>

function DocCalendar({user}){
  var todayD=new Date();
  var _viewState=useState("day");var view=_viewState[0];var setView=_viewState[1];
  var _selDateState=useState(new Date());var selDate=_selDateState[0];var setSelDate=_selDateState[1];
  var _apptsState=useState([]);var appts=_apptsState[0];var setAppts=_apptsState[1];
  var _blockedState=useState([]);var blocked=_blockedState[0];var setBlocked=_blockedState[1];
  var _loadingState=useState(true);var loading=_loadingState[0];var setLoading=_loadingState[1];
  var _selApptState=useState(null);var selAppt=_selApptState[0];var setSelAppt=_selApptState[1];
  var _newSlotState=useState(null);var newSlot=_newSlotState[0];var setNewSlot=_newSlotState[1];
  var _calReschedModeState=useState(false);var calReschedMode=_calReschedModeState[0];var setCalReschedMode=_calReschedModeState[1];
  var _calNewDateState=useState("");var calNewDate=_calNewDateState[0];var setCalNewDate=_calNewDateState[1];
  var _calNewTimeState=useState("");var calNewTime=_calNewTimeState[0];var setCalNewTime=_calNewTimeState[1];
  var _calCancelModeState=useState(null);var calCancelMode=_calCancelModeState[0];var setCalCancelMode=_calCancelModeState[1];
  var _calCancelReasonState=useState("");var calCancelReason=_calCancelReasonState[0];var setCalCancelReason=_calCancelReasonState[1];
  var _calCancelCustomState=useState("");var calCancelCustom=_calCancelCustomState[0];var setCalCancelCustom=_calCancelCustomState[1];
  var _showTreatFormState=useState(false);var showTreatForm=_showTreatFormState[0];var setShowTreatForm=_showTreatFormState[1];
  var _miniMonthState=useState(new Date());var miniMonth=_miniMonthState[0];var setMiniMonth=_miniMonthState[1];

  var MONTHS=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  var DAYS_SHORT=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
  var DAYS_MIN=["L","M","M","G","V","S","D"];
  var HOURS=Array.from({length:25},function(_,i){return 8+i*0.5;}).filter(function(h){return h<=20;});

  // Colori per trattamento
  var treatColor=function(service){
    if(!service) return "#c8a96e";
    var s=service.toLowerCase();
    if(s.includes("botox")||s.includes("tossina")) return "#5b8dee";
    if(s.includes("filler")||s.includes("riempitiv")) return "#c8a96e";
    if(s.includes("rino")||s.includes("naso")) return "#9b7fd4";
    if(s.includes("laser")||s.includes("peeling")) return "#e06b4a";
    if(s.includes("visita")||s.includes("consulto")) return "#2dc889";
    if(s.includes("biorivitaliz")||s.includes("mesote")) return "#4ecdc4";
    return "#c8a96e";
  };

  var formatHour=function(h){
    var hh=Math.floor(h);
    var mm=h%1===0?"00":"30";
    return String(hh).padStart(2,"0")+":"+mm;
  };

  var dateStr=function(d){
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  };

  var addDays=function(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;};

  useEffect(function(){
    if(!user||!user.id) return;
    sb.from("appointments")
      .select("*, patient:profiles!appointments_patient_id_fkey(name,phone)")
      .eq("doctor_id",user.id)
      .neq("status","cancelled")
      .order("date",{ascending:true})
      .then(function(res){
        if(!res.error&&res.data) setAppts(res.data);
        setLoading(false);
      });
    // Carica slot bloccati da localStorage
    var stored=localStorage.getItem("blocked_"+user.id);
    if(stored) setBlocked(JSON.parse(stored));
  },[user]);

  var saveBlocked=function(newB){
    localStorage.setItem("blocked_"+user.id,JSON.stringify(newB));
    setBlocked(newB);
  };

  var toggleBlock=function(dateS,hour){
    var key=dateS+"_"+hour;
    var exists=blocked.find(function(b){return b.key===key;});
    if(exists) saveBlocked(blocked.filter(function(b){return b.key!==key;}));
    else saveBlocked([...blocked,{key:key,date:dateS,hour:hour}]);
  };

  var isBlocked=function(dateS,hour){return !!blocked.find(function(b){return b.key===dateS+"_"+hour;});};

  var getApptAtSlot=function(dateS,hour){
    return appts.filter(function(a){
      if(a.date!==dateS) return false;
      if(!a.time) return false;
      var parts=a.time.split(":");
      var h=parseInt(parts[0])+(parseInt(parts[1]||0)/60);
      return h>=hour&&h<hour+0.5;
    });
  };

  // Navigazione
  var prevDay=function(){setSelDate(function(d){return addDays(d,-1);});};
  var nextDay=function(){setSelDate(function(d){return addDays(d,1);});};
  var goToday=function(){setSelDate(new Date());};

  // Settimana corrente
  var getWeekDays=function(d){
    var day=d.getDay();
    var mon=addDays(d,-(day===0?6:day-1));
    return Array.from({length:7},function(_,i){return addDays(mon,i);});
  };
  var weekDays=getWeekDays(selDate);

  // Mini calendario
  var miniYear=miniMonth.getFullYear();
  var miniMon=miniMonth.getMonth();
  var miniFirst=new Date(miniYear,miniMon,1).getDay();
  var miniFirstAdj=miniFirst===0?6:miniFirst-1;
  var miniDays=new Date(miniYear,miniMon+1,0).getDate();
  var apptDays={};
  appts.forEach(function(a){if(a.date){var p=a.date.split("-");if(parseInt(p[1])-1===miniMon&&parseInt(p[0])===miniYear){apptDays[parseInt(p[2])]=true;}}});

  var isToday=function(d){return dateStr(d)===dateStr(todayD);};
  var isSel=function(d){return dateStr(d)===dateStr(selDate);};

  // Slot height: each 30min = 48px
  var SLOT_H=48;

  return(
    <div className="fade-in" style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:16,alignItems:"flex-start"}}>
      {/* Sidebar sinistra */}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {/* Mini calendario */}
        <Card style={{padding:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{fontSize:12,fontWeight:700}}>{MONTHS[miniMon]+" "+miniYear}</p>
            <div style={{display:"flex",gap:2}}>
              <button onClick={function(){setMiniMonth(function(m){return new Date(m.getFullYear(),m.getMonth()-1,1);});}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:14,padding:"2px 5px"}}>‹</button>
              <button onClick={function(){setMiniMonth(function(m){return new Date(m.getFullYear(),m.getMonth()+1,1);});}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:14,padding:"2px 5px"}}>›</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:4}}>
            {DAYS_MIN.map(function(d,i){return <p key={i} style={{textAlign:"center",fontSize:9,color:"var(--text3)",fontWeight:700,padding:"2px 0"}}>{d}</p>;})}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
            {Array.from({length:miniFirstAdj},function(_,i){return <div key={"e"+i}/>;})}
            {Array.from({length:miniDays},function(_,i){
              var d=i+1;
              var dd=new Date(miniYear,miniMon,d);
              var sel=isSel(dd);
              var tod=isToday(dd);
              var hasA=!!apptDays[d];
              return(
                <button key={d} onClick={function(){setSelDate(dd);}} style={{position:"relative",width:"100%",aspectRatio:"1",borderRadius:"50%",border:"none",background:sel?"var(--gold)":tod?"rgba(200,169,110,0.2)":"none",color:sel?"#fff":tod?"var(--gold)":"var(--text)",fontSize:10,fontWeight:sel||tod?700:400,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {d}
                  {hasA&&!sel&&<div style={{position:"absolute",bottom:1,left:"50%",width:3,height:3,borderRadius:"50%",background:"var(--gold)",marginLeft:-1.5}}/>}
                </button>
              );
            })}
          </div>
          <button onClick={goToday} style={{width:"100%",marginTop:10,padding:"6px",borderRadius:"var(--radius)",background:"var(--bg2)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:11,cursor:"pointer",fontWeight:600}}>Oggi</button>
        </Card>

        {/* Legenda trattamenti */}
        <Card style={{padding:"14px"}}>
          <p style={{fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:1,marginBottom:10}}>TRATTAMENTI</p>
          {[["Filler/Riempitivi","#c8a96e"],["Botox/Tossina","#5b8dee"],["Rinofiller","#9b7fd4"],["Laser/Peeling","#e06b4a"],["Visita/Consulto","#2dc889"],["Biorivitalizzazione","#4ecdc4"]].map(function(t){return(
            <div key={t[0]} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{width:10,height:10,borderRadius:2,background:t[1],flexShrink:0}}/>
              <p style={{fontSize:11,color:"var(--text2)"}}>{t[0]}</p>
            </div>
          );})}
        </Card>
      </div>

      {/* Area calendario principale */}
      <div>
        {/* Header navigazione */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={prevDay} style={{padding:"6px 10px",borderRadius:"var(--radius)",background:"var(--surface)",border:"1px solid var(--border)",cursor:"pointer",color:"var(--text2)",fontSize:14}}>‹</button>
            <button onClick={nextDay} style={{padding:"6px 10px",borderRadius:"var(--radius)",background:"var(--surface)",border:"1px solid var(--border)",cursor:"pointer",color:"var(--text2)",fontSize:14}}>›</button>
            <h2 style={{fontSize:16,fontWeight:700,marginLeft:4}}>
              {DAYS_SHORT[(selDate.getDay()+6)%7]+" "+selDate.getDate()+" "+MONTHS[selDate.getMonth()]+" "+selDate.getFullYear()}
              {isToday(selDate)&&<span style={{fontSize:11,color:"var(--gold)",fontWeight:600,marginLeft:8}}>Oggi</span>}
            </h2>
          </div>
          <div style={{display:"flex",gap:6}}>
            {["day","week","month"].map(function(v){

              return <button key={v} onClick={function(){setView(v);}} style={{padding:"6px 12px",borderRadius:"var(--radius)",background:view===v?"var(--gold)":"var(--surface)",border:"1px solid "+(view===v?"var(--gold)":"var(--border)"),color:view===v?"#fff":"var(--text2)",fontSize:11,fontWeight:view===v?700:400,cursor:"pointer"}}>{labels[v]}</button>;

                var slotAppts=getApptAtSlot(ds,hour);
                var isHalf=hour%1!==0;
                var blk=isBlocked(ds,hour);
                var isCurrentHour=isToday(selDate)&&Math.floor(todayD.getHours()+(todayD.getMinutes()/60))===Math.floor(hour)&&(todayD.getMinutes()<30)===isHalf;
                return(
                  <div key={hour} style={{display:"flex",minHeight:SLOT_H+"px",borderBottom:"1px solid "+(isHalf?"transparent":"var(--border)"),position:"relative",background:blk?"rgba(196,85,53,0.04)":isCurrentHour?"rgba(200,169,110,0.06)":"transparent"}}>

                    <div style={{width:56,flexShrink:0,padding:"4px 8px 0",textAlign:"right"}}>

                    {/* Slot content */}
                    <div style={{flex:1,padding:"3px 8px",position:"relative",cursor:slotAppts.length===0&&!blk?"pointer":"default"}}
                      onClick={function(){if(slotAppts.length===0&&!blk) setNewSlot({date:ds,hour:hour});}}>
                      {blk?(
                        <div style={{height:"100%",background:"repeating-linear-gradient(45deg,rgba(196,85,53,0.06),rgba(196,85,53,0.06) 4px,transparent 4px,transparent 12px)",borderRadius:4,display:"flex",alignItems:"center",padding:"0 8px"}}>
                          <p style={{fontSize:10,color:"var(--coral)",fontWeight:600}}>🔒 Bloccato</p>
                          <button onClick={function(e){e.stopPropagation();toggleBlock(ds,hour);}} style={{marginLeft:"auto",background:"none",border:"none",color:"var(--text3)",fontSize:10,cursor:"pointer"}}>Sblocca</button>
                        </div>
                      ):slotAppts.length>0?(
                        slotAppts.map(function(a){
                          var pName=a.patient&&a.patient.name?a.patient.name:"Paziente";
                          var col=treatColor(a.service);
                          return(
                            <div key={a.id} onClick={function(e){e.stopPropagation();setSelAppt(a);}}
                              style={{background:col+"22",borderLeft:"3px solid "+col,borderRadius:4,padding:"4px 8px",cursor:"pointer",marginBottom:2}}>
                              <p style={{fontSize:11,fontWeight:700,color:col}}>{a.time} — {pName}</p>
                              <p style={{fontSize:10,color:"var(--text2)"}}>{a.service}{a.location_name?" · "+a.location_name:""}</p>
                            </div>
                          );
                        })
                      ):(
                        <div style={{height:"100%",display:"flex",alignItems:"center"}}>
                          <p style={{fontSize:10,color:"transparent",transition:"color .15s"}} className="slot-hint">+ Blocca slot</p>
                        </div>
                      )}
                      {/* Pulsante blocca su hover per slot vuoti */}
                      {slotAppts.length===0&&!blk&&(
                        <button onClick={function(e){e.stopPropagation();toggleBlock(ds,hour);}}
                          style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"none",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"2px 8px",fontSize:9,color:"var(--text3)",cursor:"pointer",opacity:0}}
                          className="block-btn">🔒</button>
                      )}
                    </div>
                    {/* Linea ora corrente */}
                    {isCurrentHour&&<div style={{position:"absolute",left:56,right:0,top:0,height:2,background:"var(--gold)",zIndex:2}}/>}
                  </div>
                );
              })}
            </div>
          </Card>
        )}

        {/* VISTA SETTIMANA */}

            <div style={{overflowY:"auto",maxHeight:"calc(100vh - 280px)"}}>

                      var ds=dateStr(d);

                        <div key={di} onClick={function(){setSelDate(d);setView("day");}} style={{borderRight:"1px solid var(--border)",padding:"3px 4px",cursor:"pointer",background:isToday(d)?"rgba(200,169,110,0.03)":"transparent"}}>

                    })}
                  </div>

            </div>
          </Card>

          <Card style={{padding:0,overflow:"hidden"}}>

              for(var i=1;i<=days;i++) cells.push(i);
              while(cells.length%7!==0) cells.push(null);

function PaymentForm({user,patientId,patientName,appointmentId,onSave,onClose}){
  var _amtState=useState("");var amt=_amtState[0];var setAmt=_amtState[1];
  var _descState=useState("");var desc=_descState[0];var setDesc=_descState[1];
  var _statusState=useState("draft");var status=_statusState[0];var setStatus=_statusState[1];
  var _methodState=useState("");var method=_methodState[0];var setMethod=_methodState[1];
  var _notesState=useState("");var notes=_notesState[0];var setNotes=_notesState[1];
  var _savingState=useState(false);var saving=_savingState[0];var setSaving=_savingState[1];

  var save=async function(){
    if(!amt||!desc) return;
    setSaving(true);
    var res=await sb.from("payments").insert({
      doctor_id:user.id,patient_id:patientId,appointment_id:appointmentId||null,
      amount:parseFloat(amt),description:desc,status:status,method:method||null,notes:notes||null
    });
    if(!res.error) onSave();
    setSaving(false);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div>
          <p style={{fontSize:11,color:"var(--text3)",marginBottom:4,fontWeight:600}}>IMPORTO (€)</p>
          <input type="number" value={amt} onChange={function(e){setAmt(e.target.value);}} placeholder="0.00"
            style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:14,fontWeight:700}}/>
        </div>
        <div>
          <p style={{fontSize:11,color:"var(--text3)",marginBottom:4,fontWeight:600}}>STATO</p>
          <select value={status} onChange={function(e){setStatus(e.target.value);}}
            style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:13}}>
            <option value="draft">Bozza</option>
            <option value="sent">Inviato</option>
            <option value="partial">Acconto</option>
            <option value="paid">Pagato</option>
            <option value="cancelled">Annullato</option>
          </select>
        </div>
      </div>
      <div>
        <p style={{fontSize:11,color:"var(--text3)",marginBottom:4,fontWeight:600}}>DESCRIZIONE TRATTAMENTO</p>
        <input value={desc} onChange={function(e){setDesc(e.target.value);}} placeholder="es. Filler labbra 1ml..."
          style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:13}}/>
      </div>
      <div>
        <p style={{fontSize:11,color:"var(--text3)",marginBottom:6,fontWeight:600}}>METODO DI PAGAMENTO</p>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {[["","— Nessuno"],["cash","💵 Contanti"],["card","💳 Carta"],["transfer","🏦 Bonifico"],["app","📱 Paga in app"]].map(function(m){
            return <button key={m[0]} onClick={function(){setMethod(m[0]);}}
              style={{padding:"6px 12px",borderRadius:"var(--radius)",background:method===m[0]?"var(--gold)":"var(--bg2)",border:"1px solid "+(method===m[0]?"var(--gold)":"var(--border)"),color:method===m[0]?"#fff":"var(--text2)",fontSize:11,fontWeight:method===m[0]?700:400,cursor:"pointer"}}>
              {m[1]}
            </button>;
          })}
        </div>
      </div>
      {method==="app"&&(
        <div style={{padding:"10px 12px",borderRadius:"var(--radius)",background:"rgba(200,169,110,0.08)",border:"1px solid rgba(200,169,110,0.2)"}}>
          <p style={{fontSize:11,color:"var(--gold)",fontWeight:700,marginBottom:2}}>📱 Mock pagamento in app</p>
          <p style={{fontSize:11,color:"var(--text3)"}}>Il paziente riceverà una notifica in chat con il link per pagare. Funzione dimostrativa.</p>
        </div>
      )}
      <div>
        <p style={{fontSize:11,color:"var(--text3)",marginBottom:4,fontWeight:600}}>NOTE (opzionale)</p>
        <textarea value={notes} onChange={function(e){setNotes(e.target.value);}} rows={2} placeholder="Acconto ricevuto il..."
          style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:12,resize:"none",fontFamily:"inherit"}}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={save} disabled={saving||!amt||!desc}
          style={{flex:1,padding:"10px",borderRadius:"var(--radius)",background:"var(--gold)",border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(saving||!amt||!desc)?0.5:1}}>
          {saving?"Salvataggio...":"Salva preventivo"}
        </button>
        <button onClick={onClose} style={{padding:"10px 16px",borderRadius:"var(--radius)",background:"none",border:"1px solid var(--border)",color:"var(--text3)",fontSize:13,cursor:"pointer"}}>Annulla</button>
      </div>
    </div>
  );
}

function PaymentList({payments,onStatusChange,onDelete}){
  var STATUS_META={
    draft:{label:"Bozza",color:"var(--text3)",bg:"var(--bg2)"},
    sent:{label:"Inviato",color:"#5b8dee",bg:"rgba(91,141,238,0.1)"},
    partial:{label:"Acconto",color:"var(--gold)",bg:"rgba(200,169,110,0.1)"},
    paid:{label:"Pagato",color:"var(--teal)",bg:"var(--teal-dim)"},
    cancelled:{label:"Annullato",color:"var(--coral)",bg:"var(--coral-dim)"}
  };
  var METHOD_ICON={cash:"💵",card:"💳",transfer:"🏦",app:"📱"};

  if(payments.length===0) return(
    <div style={{textAlign:"center",padding:"2rem"}}>
      <p style={{fontSize:24,marginBottom:8}}>💳</p>
      <p style={{color:"var(--text3)",fontSize:13}}>Nessun pagamento registrato</p>
    </div>
  );

  var total=payments.reduce(function(s,p){return s+(p.status!=="cancelled"?parseFloat(p.amount||0):0);},0);
  var paid=payments.reduce(function(s,p){return s+(p.status==="paid"?parseFloat(p.amount||0):0);},0);

  return(
    <div>
      <div style={{display:"flex",gap:12,marginBottom:16}}>
        {[["Totale","€ "+total.toFixed(2),"var(--text)"],["Incassato","€ "+paid.toFixed(2),"var(--teal)"],["Da incassare","€ "+(total-paid).toFixed(2),"var(--gold)"]].map(function(s){return(

function TreatmentNoteForm({user,patientId,patientName,appointmentId,service,date,onSave,onClose}){

  var _productsState=useState([{name:"",quantity:"",unit:"ml"}]);var products=_productsState[0];var setProducts=_productsState[1];
  var _photosState=useState([]);var photos=_photosState[0];var setPhotos=_photosState[1];
  var _photoTypeState=useState("pre");var photoType=_photoTypeState[0];var setPhotoType=_photoTypeState[1];
  var _savingState=useState(false);var saving=_savingState[0];var setSaving=_savingState[1];
  var photoInputRef=useRef(null);

  var addProduct=function(){setProducts(function(prev){return [...prev,{name:"",quantity:"",unit:"ml"}];});};
  var removeProduct=function(i){setProducts(function(prev){return prev.filter(function(_,j){return j!==i;});});};
  var updateProduct=function(i,field,val){setProducts(function(prev){return prev.map(function(p,j){return j===i?Object.assign({},p,{[field]:val}):p;});});};

  var handlePhotos=function(fileList,type){
    var arr=Array.from(fileList);
    var promises=arr.map(function(f){
      return new Promise(function(resolve){
        var reader=new FileReader();
        reader.onload=function(e){resolve({id:Date.now()+Math.random(),type:type,name:f.name,data:e.target.result,size:f.size});};
        reader.readAsDataURL(f);
      });
    });
    Promise.all(promises).then(function(newP){
      setPhotos(function(prev){return [...prev,...newP];});
    });
  };

  var removePhoto=function(id){setPhotos(function(prev){return prev.filter(function(p){return p.id!==id;});});};

  var save=async function(){
    if(!svc||!tDate) return;
    setSaving(true);
    var validProducts=products.filter(function(p){return p.name.trim();});
    var res=await sb.from("treatment_notes").insert({
      doctor_id:user.id,
      patient_id:patientId,
      appointment_id:appointmentId||null,
      treatment_date:tDate,
      service:svc,
      notes:notes||null,
      products:validProducts.length>0?validProducts:null,
      photos:photos.length>0?photos.map(function(p){return {type:p.type,name:p.name,data:p.data};}):null
    });
    if(!res.error) onSave();
    else console.error("[TreatmentNote] save error:",res.error);
    setSaving(false);

  var postPhotos=photos.filter(function(p){return p.type==="post";});

            style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:13}}/>
        </div>
        <div>
          <p style={{fontSize:11,color:"var(--text3)",marginBottom:4,fontWeight:600}}>DATA</p>
          <input type="date" value={tDate} onChange={function(e){setTDate(e.target.value);}}
            style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:13}}/>
        </div>
      </div>

      {/* Note cliniche */}
      <div>
        <p style={{fontSize:11,color:"var(--text3)",marginBottom:4,fontWeight:600}}>NOTE CLINICHE</p>
        <textarea value={notes} onChange={function(e){setNotes(e.target.value);}} rows={4}
          placeholder="Descrivi la procedura, tecnica utilizzata, osservazioni post-trattamento, raccomandazioni..."
          style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:13,resize:"vertical",fontFamily:"inherit",lineHeight:1.6}}/>
      </div>

      {/* Prodotti usati */}
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <p style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>PRODOTTI UTILIZZATI</p>
          <button onClick={addProduct} style={{padding:"3px 10px",borderRadius:"var(--radius)",background:"var(--bg2)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:11,cursor:"pointer"}}>+ Aggiungi</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {products.map(function(p,i){
            return(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 80px 70px 32px",gap:6,alignItems:"center"}}>
                <input value={p.name} onChange={function(e){updateProduct(i,"name",e.target.value);}} placeholder="Nome prodotto / farmaco..."
                  style={{padding:"7px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:12}}/>
                <input type="number" value={p.quantity} onChange={function(e){updateProduct(i,"quantity",e.target.value);}} placeholder="Qtà"
                  style={{padding:"7px 8px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text)",fontSize:12,textAlign:"center"}}/>

        {(prePhotos.length>0||postPhotos.length>0)&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

              return(
                <div key={col[0]}>
                  <p style={{fontSize:10,color:"var(--text3)",fontWeight:700,marginBottom:6}}>{col[1]} ({col[2].length})</p>

function PortfolioForm({user,editing,categories,docServices,allCats,onSave,onClose}){
  var _titleState=useState(editing?editing.title:"");var title=_titleState[0];var setTitle=_titleState[1];
  var _catState=useState(editing?editing.category||"":"");var cat=_catState[0];var setCat=_catState[1];
  var _addToProfileState=useState(false);var addToProfile=_addToProfileState[0];var setAddToProfile=_addToProfileState[1];
  var _searchCatState=useState("");var searchCat=_searchCatState[0];var setSearchCat=_searchCatState[1];
  var _descState=useState(editing?editing.description||"":"");var desc=_descState[0];var setDesc=_descState[1];
  var _visState=useState(editing?editing.visible:true);var vis=_visState[0];var setVis=_visState[1];
  var _beforeState=useState(editing?editing.photo_before||null:null);var photoBefore=_beforeState[0];var setPhotoBefore=_beforeState[1];
  var _afterState=useState(editing?editing.photo_after||null:null);var photoAfter=_afterState[0];var setPhotoAfter=_afterState[1];
  var _savingState=useState(false);var saving=_savingState[0];var setSaving=_savingState[1];
  var _dragBeforeState=useState(false);var dragBefore=_dragBeforeState[0];var setDragBefore=_dragBeforeState[1];
  var _dragAfterState=useState(false);var dragAfter=_dragAfterState[0];var setDragAfter=_dragAfterState[1];
  var beforeRef=useRef(null);
  var afterRef=useRef(null);

  var loadImage=function(file,setter){
    var reader=new FileReader();
    reader.onload=function(e){setter(e.target.result);};
    reader.readAsDataURL(file);
  };

  var save=async function(){
    if(!title.trim()) return;
    setSaving(true);
    var data={
      doctor_id:user.id,title:title.trim(),category:cat||null,
      description:desc||null,visible:vis,
      photo_before:photoBefore||null,photo_after:photoAfter||null
    };
    var res;
    if(editing){
      res=await sb.from("portfolio").update(data).eq("id",editing.id);
    } else {
      res=await sb.from("portfolio").insert(data);
    }
    // Se richiesto, aggiungi la categoria ai servizi del profilo medico
    if(!res.error&&addToProfile&&cat&&docServices&&!docServices.includes(cat)){
      var updatedServices=[...docServices,cat];
      await sb.from("doctor_profiles").update({services:updatedServices}).eq("id",user.id);
    }
    if(!res.error) onSave();
    else console.error("[Portfolio] save error:",res.error);
    setSaving(false);
  };

  var PhotoUploader=function(props){
    var label=props.label;var photo=props.photo;var setter=props.setter;var drag=props.drag;var setDrag=props.setDrag;var inputRef=props.inputRef;
    var _uploadingState=useState(false);var uploading=_uploadingState[0];var setUploading=_uploadingState[1];

    var uploadToStorage=async function(file){
      if(!file||!file.type.startsWith("image/")) return;
      if(file.size>5*1024*1024){alert("Max 5MB");return;}
      setUploading(true);
      var ext=file.name.split(".").pop()||"jpg";
      var path="portfolio/"+Date.now()+"-"+Math.random().toString(36).slice(2)+"."+ext;
      var res=await sb.storage.from("Doctor media").upload(path,file,{upsert:true,contentType:file.type});
      if(!res.error){
        var urlRes=sb.storage.from("Doctor media").getPublicUrl(path);
        setter(urlRes.data.publicUrl);
      } else {
        // fallback to base64
        loadImage(file,setter);
      }
      setUploading(false);
    };

    return(
      <div style={{flex:1}}>
        <p style={{fontSize:11,color:"var(--text3)",fontWeight:700,marginBottom:6}}>{label}</p>
        {photo?(
          <div style={{position:"relative",borderRadius:"var(--radius)",overflow:"hidden",height:160}}>
            <img src={photo} alt={label} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"background .2s"}}
              onMouseEnter={function(e){e.currentTarget.style.background="rgba(0,0,0,0.4)";}}
              onMouseLeave={function(e){e.currentTarget.style.background="rgba(0,0,0,0)";}}>
              <button onClick={function(){inputRef.current&&inputRef.current.click();}} style={{padding:"6px 12px",borderRadius:"var(--radius)",background:"rgba(255,255,255,0.9)",border:"none",fontSize:11,fontWeight:700,cursor:"pointer"}}>Cambia</button>
              <button onClick={function(){setter(null);}} style={{padding:"6px 12px",borderRadius:"var(--radius)",background:"rgba(196,85,53,0.9)",border:"none",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>Rimuovi</button>
            </div>
          </div>
        ):(
          <div
            onDragOver={function(e){e.preventDefault();setDrag(true);}}
            onDragLeave={function(){setDrag(false);}}
            onDrop={function(e){e.preventDefault();setDrag(false);var f=e.dataTransfer.files[0];if(f)uploadToStorage(f);}}
            onClick={function(){inputRef.current&&inputRef.current.click();}}
            style={{height:160,border:"2px dashed "+(drag?"var(--gold)":"var(--border)"),borderRadius:"var(--radius)",background:drag?"rgba(200,169,110,0.06)":"var(--bg2)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .2s",gap:6}}>
            {uploading?(
              <><p style={{fontSize:24}}>⏳</p><p style={{fontSize:11,color:"var(--gold)"}}>Caricamento...</p></>
            ):(
              <><p style={{fontSize:28}}>{drag?"📂":"📷"}</p><p style={{fontSize:11,color:drag?"var(--gold)":"var(--text3)",fontWeight:drag?700:400}}>{drag?"Rilascia qui":"Trascina o clicca"}</p></>
            )}
          </div>
        )}
        <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={function(e){var f=e.target.files[0];if(f)uploadToStorage(f);e.target.value="";}}/>
      </div>
    );
  };

        <p style={{fontSize:11,color:"var(--text3)",marginBottom:4,fontWeight:600}}>TITOLO CASO *</p>

      </div>

      {/* Categoria */}

          {cat&&!docServices.includes(cat)&&(
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:10,color:"#5b8dee"}}>⚡ Non nel tuo profilo</span>
              <button onClick={function(){setAddToProfile(!addToProfile);}}
                style={{padding:"3px 10px",borderRadius:99,background:addToProfile?"#5b8dee":"var(--bg2)",border:"1px solid "+(addToProfile?"#5b8dee":"var(--border)"),color:addToProfile?"#fff":"var(--text2)",fontSize:10,fontWeight:700,cursor:"pointer"}}>

        <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
          {Object.entries(TAXONOMY).map(function(entry){
            var area=entry[0];var data=entry[1];
            var areaServices=data.services.filter(function(s){return !searchCat||s.toLowerCase().includes(searchCat.toLowerCase());});

function FolderUpload({folder,doctorId,patientId,onUpdate}){
  var _dragState=useState(false);var drag=_dragState[0];var setDrag=_dragState[1];
  var _filesState=useState([]);var files=_filesState[0];var setFiles=_filesState[1];
  var inputRef=useRef(null);

  useEffect(function(){
    // Carica file salvati per questa cartella
    var key="files_"+doctorId+"_"+patientId+"_"+folder.id;
    var stored=localStorage.getItem(key);
    if(stored) setFiles(JSON.parse(stored));
  },[folder,doctorId,patientId]);

  var keyRef=useRef("files_"+doctorId+"_"+patientId+"_"+folder.id);
  useEffect(function(){keyRef.current="files_"+doctorId+"_"+patientId+"_"+folder.id;},[folder,doctorId,patientId]);

  var saveFiles=function(newFiles){
    localStorage.setItem(keyRef.current,JSON.stringify(newFiles));
    setFiles(newFiles);
  };

  var handleFiles=function(fileList){
    var arr=Array.from(fileList);
    var promises=arr.map(function(f){
      return new Promise(function(resolve){
        var reader=new FileReader();
        reader.onload=function(e){
          resolve({id:Date.now()+Math.random(),name:f.name,size:f.size,type:f.type,data:e.target.result,date:new Date().toLocaleDateString("it-IT")});
        };
        reader.readAsDataURL(f);
      });
    });
    Promise.all(promises).then(function(newF){
      // Usa aggiornamento funzionale per evitare stale closure su files
      setFiles(function(prev){
        var updated=[...prev,...newF];
        localStorage.setItem(keyRef.current,JSON.stringify(updated));
        return updated;
      });
    });
  };

  var removeFile=function(id){
    saveFiles(files.filter(function(f){return f.id!==id;}));
  };

  var formatSize=function(bytes){
    if(bytes<1024) return bytes+"B";
    if(bytes<1024*1024) return Math.round(bytes/1024)+"KB";
    return (bytes/(1024*1024)).toFixed(1)+"MB";
  };

  var getIcon=function(type,name){
    if(type.includes("image")) return "🖼️";
    if(type.includes("pdf")||name.endsWith(".pdf")) return "📄";
    if(type.includes("word")||name.endsWith(".doc")||name.endsWith(".docx")) return "📝";
    if(type.includes("sheet")||name.endsWith(".xls")||name.endsWith(".xlsx")) return "📊";
    return "📎";
  };

  return(
    <div>
      {/* Drop zone */}
      <div
        onDragOver={function(e){e.preventDefault();setDrag(true);}}
        onDragLeave={function(){setDrag(false);}}
        onDrop={function(e){e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);}}
        onClick={function(){inputRef.current&&inputRef.current.click();}}
        style={{
          border:"2px dashed "+(drag?"var(--gold)":"var(--border)"),
          borderRadius:"var(--radius-lg)",
          padding:"32px 20px",
          textAlign:"center",
          cursor:"pointer",
          background:drag?"rgba(200,169,110,0.06)":"var(--bg2)",
          transition:"all .2s",
          marginBottom:16
        }}>
        <input ref={inputRef} type="file" multiple style={{display:"none"}} onChange={function(e){handleFiles(e.target.files);e.target.value="";}}/>
        <p style={{fontSize:28,marginBottom:8}}>{drag?"📂":"📁"}</p>
        <p style={{fontSize:13,fontWeight:600,color:drag?"var(--gold)":"var(--text2)",marginBottom:4}}>{drag?"Rilascia i file qui":"Trascina i file qui"}</p>
        <p style={{fontSize:11,color:"var(--text3)"}}>oppure clicca per selezionare</p>
      </div>

      {/* File list */}
      {files.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {files.map(function(f){
            return(
              <div key={f.id} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 14px",borderRadius:"var(--radius)",background:"var(--surface)",border:"1px solid var(--border)"}}>
                <span style={{fontSize:22,flexShrink:0}}>{getIcon(f.type,f.name)}</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.name}</p>
                  <p style={{fontSize:10,color:"var(--text3)"}}>{formatSize(f.size)} · {f.date}</p>
                </div>
                <a href={f.data} download={f.name} style={{padding:"5px 10px",borderRadius:"var(--radius)",background:"var(--bg2)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:11,textDecoration:"none",flexShrink:0}}>↓</a>
                <button onClick={function(){removeFile(f.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:16,lineHeight:1,padding:"4px",flexShrink:0}}>✕</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

      )}
    </div>
  );
}

      .eq("doctor_id",user.id)
      .eq("status","pending")

    if(!res.error&&res.data) setReqs(res.data);
    setLoading(false);

    return function(){clearInterval(interval);};
  },[fetchReqs]);

  // Sync sel con dati aggiornati dal polling
  useEffect(function(){

      return updated||prev;
    });

  var openDetail=async function(r){
    setSel(r);setMode(null);setAnam(null);setAnamLoad(true);

    if(!res.error&&res.data){
      setAnam(res.data);

      var res2=await sb.from("anamnesi").select("*").eq("patient_id",r.patient_id).order("created_at",{ascending:false}).limit(1).maybeSingle();

  var closeDetail=function(){setSel(null);setMode(null);setAnam(null);};

    const next=macroAreas.includes(area)?macroAreas.filter(x=>x!==area):[...macroAreas,area];
    const allowed=next.flatMap(a=>TAXONOMY[a].services);
    const nextSvc=services.filter(s=>allowed.includes(s));
    onChange({macroAreas:next,services:nextSvc});
  };
  const toggleSvc=svc=>{
    if(disabled)return;
    const next=services.includes(svc)?services.filter(x=>x!==svc):[...services,svc];
    onChange({macroAreas,services:next});
  };
  return(
    <div>
      <div style={{marginBottom:"1.25rem"}}>
        <label className="label" style={{marginBottom:"0.6rem"}}>STEP 1 — MACRO AREE DI SPECIALIZZAZIONE</label>

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {allMacro.map(area=>{
            const sel=macroAreas.includes(area);
            const t=TAXONOMY[area];
            return(
              <button key={area} onClick={()=>toggleMacro(area)} disabled={disabled}
                style={{padding:"12px 8px",borderRadius:"var(--radius-lg)",border:"1.5px solid "+(sel?t.color:"var(--border)"),background:sel?(t.color+"12"):"var(--bg2)",color:sel?t.color:"var(--text3)",textAlign:"center",transition:"all .2s",cursor:disabled?"default":"pointer",opacity:disabled?0.6:1}}>
                <div style={{fontSize:18,marginBottom:5}}>{t.icon}</div>
                <p style={{fontSize:11,fontWeight:sel?700:500,lineHeight:1.3}}>{area}</p>
                <p style={{fontSize:9,color:sel?t.color:"var(--text3)",marginTop:3}}>{t.services.length} trattamenti</p>
              </button>
            );
          })}
        </div>
      </div>
      <div style={{opacity:macroAreas.length===0?0.35:1,transition:"opacity .3s",pointerEvents:macroAreas.length===0||disabled?"none":"auto"}}>
        <label className="label" style={{marginBottom:"0.5rem"}}>STEP 2 — TRATTAMENTI SPECIFICI</label>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {macroAreas.map(area=>{
            const t=TAXONOMY[area];
            const areaSelected=t.services.filter(s=>services.includes(s));
            return(
              <div key={area} style={{background:"var(--bg2)",borderRadius:"var(--radius-lg)",padding:"12px 14px",border:"1px solid "+(areaSelected.length>0?(t.color+"30"):"var(--border)")}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{fontSize:14,color:t.color}}>{t.icon}</span>
                  <p style={{fontSize:12,fontWeight:700,color:t.color}}>{area}</p>
                  {areaSelected.length>0&&<span style={{marginLeft:"auto",fontSize:10,padding:"2px 8px",borderRadius:99,background:t.color+"18",color:t.color,border:"1px solid "+t.color+"30",fontWeight:600}}>{areaSelected.length} selezionati</span>}
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {t.services.map(svc=>{
                    const sel=services.includes(svc);
                    return(
                      <button key={svc} onClick={()=>toggleSvc(svc)}
                        style={{padding:"5px 11px",borderRadius:99,border:"1px solid "+(sel?t.color:"var(--border2)"),background:sel?(t.color+"14"):"transparent",color:sel?t.color:"var(--text2)",fontSize:11,transition:"all .15s",cursor:"pointer"}}
                        onMouseEnter={e=>{if(!sel){e.currentTarget.style.borderColor=t.color;e.currentTarget.style.color=t.color;}}}
                        onMouseLeave={e=>{if(!sel){e.currentTarget.style.borderColor="var(--border2)";e.currentTarget.style.color="var(--text2)";}}}>
                        {sel?"✓ ":""}{svc}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        {services.length>0&&(
          <div style={{marginTop:12,padding:"10px 14px",background:"var(--gold-light)",borderRadius:"var(--radius)",border:"1px solid rgba(200,169,110,0.2)",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,color:"var(--gold)"}}>✦</span>
            <p style={{fontSize:11,color:"var(--gold)",fontWeight:600}}>{services.length} trattamenti selezionati</p>
          </div>
        )}
      </div>
    </div>
  );
}

function ImageUploader({userId,field,value,label,hint,aspect,onUploaded}){
  var _dragState=useState(false);var drag=_dragState[0];var setDrag=_dragState[1];
  var _uploadingState=useState(false);var uploading=_uploadingState[0];var setUploading=_uploadingState[1];
  var _errorState=useState("");var error=_errorState[0];var setError=_errorState[1];
  var inputRef=useRef(null);

  var upload=async function(file){
    if(!file||!file.type.startsWith("image/")) return setError("Solo immagini (JPG, PNG, WebP)");
    if(file.size>5*1024*1024) return setError("Max 5MB");
    setUploading(true);setError("");
    var ext=file.name.split(".").pop()||"jpg";
    var path=userId+"/"+field+"-"+Date.now()+"."+ext;
    var res=await sb.storage.from("Doctor media").upload(path,file,{upsert:true,contentType:file.type});
    if(res.error){setError("Errore upload: "+res.error.message);setUploading(false);return;}
    var urlRes=sb.storage.from("Doctor media").getPublicUrl(path);
    onUploaded(urlRes.data.publicUrl);
    setUploading(false);
  };

  var handleDrop=function(e){
    e.preventDefault();setDrag(false);
    var f=e.dataTransfer.files[0];
    if(f) upload(f);
  };

  var handleChange=function(e){
    var f=e.target.files[0];
    if(f) upload(f);
    e.target.value="";
  };

  var isProfile=field==="photo";
  return(
    <div>
      <label className="label">{label}</label>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,marginTop:4}}>
        {/* Preview */}
        {value?(
          <div style={{position:"relative",flexShrink:0}}>
            <img src={value} alt={label} style={{width:isProfile?64:96,height:isProfile?64:54,borderRadius:isProfile?"50%":"var(--radius)",objectFit:"cover",border:"2px solid var(--border)"}}/>
            <button onClick={function(){onUploaded("");}} style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:"#c45535",border:"none",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
          </div>
        ):(
          <div style={{width:isProfile?64:96,height:isProfile?64:54,borderRadius:isProfile?"50%":"var(--radius)",background:"var(--bg2)",border:"2px dashed var(--border)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontSize:isProfile?22:18}}>{isProfile?"👤":"🖼"}</span>
          </div>
        )}
        {/* Drop zone */}
        <div
          onDragOver={function(e){e.preventDefault();setDrag(true);}}
          onDragLeave={function(){setDrag(false);}}
          onDrop={handleDrop}
          onClick={function(){inputRef.current&&inputRef.current.click();}}
          style={{flex:1,padding:"10px 14px",borderRadius:"var(--radius)",border:"2px dashed "+(drag?"var(--gold)":"var(--border)"),background:drag?"rgba(200,169,110,0.06)":"var(--bg2)",cursor:"pointer",transition:"all .15s",textAlign:"center"}}>
          {uploading?(
            <p style={{fontSize:12,color:"var(--gold)"}}>⏳ Caricamento...</p>
          ):(
            <>
              <p style={{fontSize:12,color:drag?"var(--gold)":"var(--text3)",fontWeight:drag?700:400}}>{drag?"📂 Rilascia qui":"Trascina o clicca per caricare"}</p>
              <p style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{hint}</p>
            </>
          )}
        </div>
        <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleChange}/>
      </div>
      {error&&<p style={{fontSize:11,color:"#c45535",marginTop:4}}>{error}</p>}
    </div>
  );
}

function AddressAutocomplete({value,city,onChange,onSelect}){
  var _suggsState=useState([]);var suggs=_suggsState[0];var setSuggs=_suggsState[1];
  var _openState=useState(false);var open=_openState[0];var setOpen=_openState[1];
  var _loadingState=useState(false);var loading=_loadingState[0];var setLoading=_loadingState[1];
  var timerRef=useRef(null);
  var ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanJleml4bGJhcnJ5YWl5aHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4Mjg5MTYsImV4cCI6MjA5NDQwNDkxNn0.HRQZmod5tXe97GXABDyL8QB_YGL6Tf3nccLpbLblWiE";

  var search=useCallback(function(q){
    if(q.length<4){setSuggs([]);setOpen(false);return;}
    if(timerRef.current) clearTimeout(timerRef.current);
    timerRef.current=setTimeout(async function(){
      setLoading(true);
      try{
        var r=await fetch("https://tmjrezixlbarryaiyhpg.supabase.co/functions/v1/geocode",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON},
          body:JSON.stringify({address:q,city:city||""})
        });
        var d=await r.json();
        if(d&&d.suggestions&&d.suggestions.length>0){
          setSuggs(d.suggestions.slice(0,4));
          setOpen(true);
        }else if(d&&d.lat){
          setSuggs([{label:q+(city?" - "+city:""),address:q,city:city||"",lat:d.lat,lon:d.lon}]);
          setOpen(true);
        }else{
          setSuggs([]);setOpen(false);
        }
      }catch(e){setSuggs([]);setOpen(false);}
      setLoading(false);
    },500);
  },[city]);

  return(
    <div style={{position:"relative"}}>
      <div style={{position:"relative"}}>
        <input value={value}
          onChange={function(e){onChange(e.target.value);search(e.target.value);}}
          onFocus={function(){if(suggs.length>0)setOpen(true);}}
          onBlur={function(){setTimeout(function(){setOpen(false);},200);}}
          placeholder="Es. Corso Vinzaglio, 12"
          className="inp"
        />
        {loading&&<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"var(--text3)"}}>...</span>}
      </div>
      {open&&suggs.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:"var(--radius)",boxShadow:"0 4px 16px rgba(26,24,20,0.12)",zIndex:100,maxHeight:180,overflowY:"auto"}}>
          {suggs.map(function(s,i){return(
            <button key={i}
              onClick={function(){onChange(s.address);onSelect(s);setOpen(false);setSuggs([]);}}
              style={{width:"100%",padding:"9px 12px",textAlign:"left",background:"transparent",border:"none",borderBottom:"1px solid var(--border)",cursor:"pointer"}}
              onMouseEnter={function(e){e.currentTarget.style.background="var(--gold-light)";}}
              onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}>
              <p style={{fontSize:12,color:"var(--text)",marginBottom:1}}>{s.address}</p>
              <p style={{fontSize:10,color:"var(--text3)"}}>{s.city}</p>
            </button>
          );})}
        </div>
      )}
    </div>
  );
}


function DocSedi({user}){

  var _showAddLocState=useState(false);var showAddLoc=_showAddLocState[0];var setShowAddLoc=_showAddLocState[1];
  var _newLocState=useState({name:"",address:"",city:"",has_own_calendar:false,lat:null,lon:null});var newLoc=_newLocState[0];var setNewLoc=_newLocState[1];
  var _savingState=useState(false);var saving=_savingState[0];var setSaving=_savingState[1];
  var _activeLocState=useState(null);var activeLoc=_activeLocState[0];var setActiveLoc=_activeLocState[1]; // sede selezionata per il calendario
  const DAYS=["Lunedi","Martedi","Mercoledi","Giovedi","Venerdi","Sabato","Domenica"];
  const TIMES=["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];

  var load=useCallback(async function(){
    if(!user||!user.id) return;
    setLoading(true);

    var avRes=await sb.from("doctor_availability").select("*").eq("doctor_id",user.id);
    if(!locRes.error) setLocations(locRes.data||[]);
    if(!avRes.error) setAvailability(avRes.data||[]);
    setLoading(false);
  },[user]);

  useEffect(function(){load();},[load]);

  var addLocation=useCallback(async function(){
    if(!newLoc.name||!newLoc.city){return;}
    setSaving(true);
    // Geocoding automatico se non ci sono già coordinate
    var lat=newLoc.lat||null;
    var lon=newLoc.lon||null;
    if(!lat&&newLoc.city){
      try{
        var geoQuery=newLoc.address?newLoc.address+", "+newLoc.city:newLoc.city+", Italia";
        var geoRes=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(geoQuery),{
          headers:{"User-Agent":"GlowUp-App/1.0"}
        });
        var geoData=await geoRes.json();
        if(geoData&&geoData.length>0){
          lat=parseFloat(geoData[0].lat);
          lon=parseFloat(geoData[0].lon);
        }

    }
    var res=await sb.from("doctor_locations").insert({
      doctor_id:user.id,
      name:newLoc.name,
      address:newLoc.address,
      city:newLoc.city,
      has_own_calendar:newLoc.has_own_calendar,
      lat:lat,
      lon:lon

      setNewLoc({name:"",address:"",city:"",has_own_calendar:false});

  var removeLocation=async function(id){
    await sb.from("doctor_locations").delete().eq("id",id);
    setLocations(function(prev){return prev.filter(function(l){return l.id!==id;});});
  };

  var toggleDay=async function(locationId,dayIndex,currentlyActive){
    if(currentlyActive){
      // Rimuovi slot per questo giorno

        .delete()

        day_of_week:dayIndex,

  var updateTime=async function(avId,field,value){

        return n;

    });

  var ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanJleml4bGJhcnJ5YWl5aHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4Mjg5MTYsImV4cCI6MjA5NDQwNDkxNn0.HRQZmod5tXe97GXABDyL8QB_YGL6Tf3nccLpbLblWiE";
  var isDoctor=user.type==="doctor";

  var _threadsState=useState([]);var threads=_threadsState[0];var setThreads=_threadsState[1];

  var _initDoneState=useState(false);var initDone=_initDoneState[0];var setInitDone=_initDoneState[1];

  var inputRef=useRef(null);

    if(chatRef.current) chatRef.current.scrollTop=chatRef.current.scrollHeight;

    if(!user||!user.id) return;

    var res=await q.order("updated_at",{ascending:false});

  },[user,isDoctor]);

  useEffect(function(){loadThreads();},[loadThreads]);

  // Auto-open if initialDoctorId passed (from booking flow)
  useEffect(function(){
    if(initialDoctorId&&!initDone&&user){
      setInitDone(true);
      openOrCreateThread(initialDoctorId,initialDoctorName||"Medico");
    }
  },[initialDoctorId,initDone,user]);

  // Open or create thread
  var openOrCreateThread=async function(otherId,otherName){
    var q=isDoctor
      ? sb.from("chat_threads").select("*").eq("doctor_id",user.id).eq("patient_id",otherId)
      : sb.from("chat_threads").select("*").eq("patient_id",user.id).eq("doctor_id",otherId);
    var res=await q.neq("status","archived").limit(1);
    var t=res.data&&res.data.length>0?res.data[0]:null;

        patient_id:user.id,
        doctor_id:otherId,
        status:"open"

      t=ins.data&&ins.data.length>0?ins.data[0]:null;

    if(!isDoctor){
      var doctorId=t.doctor_id;

        var sysPrompt="Sei Gloria, assistente dello studio del "+otherName+". Rispondi al paziente "+user.name+".\n\n"+sediInfo+"\n\nRegole: 1) Solo domande semplici: orari, trattamenti, prenotazioni, sedi. 2) Per domande mediche specifiche chiedi: 'Per questa domanda ho bisogno di metterti in contatto con il dottore. Lasciami il numero di telefono o WhatsApp.' 3) Risposte brevi e cordiali.";
        var r=await fetch("https://tmjrezixlbarryaiyhpg.supabase.co/functions/v1/gloria",{

    }
  },[input,sel,msgs,isDoctor,user]);

  var archiveThread=async function(id){

  var ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanJleml4bGJhcnJ5YWl5aHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4Mjg5MTYsImV4cCI6MjA5NDQwNDkxNn0.HRQZmod5tXe97GXABDyL8QB_YGL6Tf3nccLpbLblWiE";
  var _threadState=useState(null);var thread=_threadState[0];var setThread=_threadState[1];
  var _msgsState=useState([]);var msgs=_msgsState[0];var setMsgs=_msgsState[1];

    sb.from("appointments").select("doctor_id").eq("patient_id",user.id).neq("status","cancelled").then(async function(res){
      if(!res.error&&res.data){
        var seen={};

  useEffect(function(){if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[msgs,loading]);

  var openChat=async function(doc){
    setSelDoc(doc);
    setDocSedi([]);docSediRef.current=[];
    console.log("[Gloria debug] openChat doc:", JSON.stringify(doc));

    sb.from("doctor_locations").select("city,address").eq("doctor_id",doc.id).then(function(locRes){
      if(!locRes.error&&locRes.data){setDocSedi(locRes.data);docSediRef.current=locRes.data;console.log("[Gloria debug] sedi caricate:",JSON.stringify(locRes.data));}else{console.log("[Gloria debug] sedi error:",locRes.error,"data:",locRes.data);}
    });
    try{
      // Cerca thread esistente o creane uno nuovo
      var res=await sb.from("chat_threads").select("*").eq("patient_id",user.id).eq("doctor_id",doc.id).eq("status","open").limit(1);
      var t=res.data&&res.data.length>0?res.data[0]:null;
      if(!t){
        var ins=await sb.from("chat_threads").insert({patient_id:user.id,doctor_id:doc.id,status:"open"}).select();
        if(ins.error){console.error("Insert thread error:",ins.error);return;}
        t=ins.data&&ins.data.length>0?ins.data[0]:null;
      }
    setThread(t);
    // Carica messaggi
    if(t){
      var mRes=await sb.from("chat_messages").select("*").eq("thread_id",t.id).order("created_at",{ascending:true});
      if(!mRes.error&&mRes.data) setMsgs(mRes.data);

      if(!mRes.data||mRes.data.length===0){

  var GLORIA_SYSTEM=function(){

  };

  var send=useCallback(async function(){
    var t2=input.trim();
    if(!t2||loading||!thread) return;
    setInput("");
    // Salva messaggio paziente
    var patMsg={thread_id:thread.id,sender_type:"patient",sender_id:user.id,content:t2};
    await sb.from("chat_messages").insert(patMsg);
    setMsgs(function(prev){return [...prev,patMsg];});

    // Gloria risponde
    try{
      var history=[...msgs,patMsg].filter(function(m){return m.sender_type!=="doctor";}).map(function(m){return {role:m.sender_type==="gloria"?"assistant":"user",content:m.content};});
      var r=await fetch("https://tmjrezixlbarryaiyhpg.supabase.co/functions/v1/gloria",{

        headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON},
        body:(function(){var ctx=GLORIA_SYSTEM();console.log("[Gloria debug] context inviato:",ctx);return JSON.stringify({messages:history,context:ctx});})()
      });
      var d=await r.json();
      if(d.content){
        var gloriaMsg={thread_id:thread.id,sender_type:"gloria",content:d.content};
        await sb.from("chat_messages").insert(gloriaMsg);
        setMsgs(function(prev){return [...prev,gloriaMsg];});
        // Controlla se Gloria chiede contatti
        if(d.content.toLowerCase().includes("telefono")||d.content.toLowerCase().includes("whatsapp")) setShowContact(true);
      }
    }catch(e){}
    setLoading(false);
  },[input,loading,thread,msgs,user,selDoc]);

  var saveContacts=async function(){
    if(!thread) return;
    await sb.from("chat_threads").update({has_contacts:true,patient_phone:phone,patient_whatsapp:wa}).eq("id",thread.id);
    setThread(function(t){return Object.assign({},t,{has_contacts:true});});
    setShowContact(false);
    // Conferma in chat
    var confMsg={thread_id:thread.id,sender_type:"gloria",content:"Grazie! Ho trasmesso i tuoi contatti allo studio. Il "+selDoc.name+" ti ricontatterà al più presto."};
    await sb.from("chat_messages").insert(confMsg);
    setMsgs(function(prev){return [...prev,confMsg];});
  };

  if(!selDoc) return(
    <div className="fade-in">
      <SecTitle title="Messaggi" sub="Chatta con il tuo studio medico"/>
      {doctors.length===0?(
        <Card style={{textAlign:"center",padding:"3rem"}}>
          <p style={{fontSize:28,marginBottom:10}}>💬</p>
          <p style={{color:"var(--text2)",marginBottom:6}}>Nessuno studio disponibile</p>
          <p style={{fontSize:11,color:"var(--text3)"}}>Prenota una visita per poter chattare con il medico</p>
        </Card>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {doctors.map(function(doc){
            var ini=doc.name.split(" ").map(function(n){return n[0];}).join("").slice(0,2).toUpperCase();
            return(
              <Card key={doc.id} style={{display:"flex",gap:14,alignItems:"center",cursor:"pointer",transition:"all .2s"}}
                onClick={function(){openChat(doc);}}
                onMouseEnter={function(e){e.currentTarget.style.borderColor="var(--gold)";e.currentTarget.style.transform="translateY(-1px)";}}
                onMouseLeave={function(e){e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.transform="none";}}>
                <Av ini={ini} sz={46} col="#c8a96e"/>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:600}}>{doc.name}</p>
                  <p style={{fontSize:11,color:"var(--text3)"}}>Clicca per aprire la chat</p>
                </div>
                <span style={{fontSize:20,color:"var(--text3)"}}>→</span>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );

  return(
    <div className="fade-in" style={{height:"calc(100vh - 52px - 3.5rem)",display:"flex",flexDirection:"column",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>

      <div style={{padding:"11px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10,background:"var(--surface)",flexShrink:0}}>
        <button onClick={function(){setSelDoc(null);setThread(null);setMsgs([]);}} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:18,lineHeight:1}}>←</button>
        <Av ini={selDoc.name.split(" ").map(function(n){return n[0];}).join("").slice(0,2).toUpperCase()} sz={34} col="#c8a96e"/>
        <div style={{flex:1}}>
          <p style={{fontSize:13,fontWeight:600}}>{selDoc.name}</p>
          <p style={{fontSize:10,color:"var(--teal)"}}>● Gloria attiva · risponde automaticamente</p>
        </div>
        {thread&&thread.has_contacts&&<span className="badge badge-green">✓ Contatti forniti</span>}

      {/* Messaggi */}
      <div ref={chatRef} style={{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:10,background:"var(--bg)"}}>
        {msgs.map(function(m,i){
