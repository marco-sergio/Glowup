// ─── RICERCA SEMANTICA INTELLIGENTE ─────────────────────────────────
function semanticSearch(query) {
  if (!query || query.length < 3) return { services: [] };
  
  const q = query.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const words = q.split(/\s+/);
  
  const synonyms = {
    "rinoplastica": ["rinoplastica", "naso", "rifare il naso", "naso storto", "setto nasale", "correggere naso"],
    "blefaroplastica": ["blefaroplastica", "palpebre", "occhi stanchi", "occhiaie", "palpebra cadente", "borsa palpebrale"],
    "filler": ["filler", "acido ialuronico", "labbra", "volumizzare labbra", "riempire rughe", "solchi nasogenieni"],
    "botox": ["botox", "tossina botulinica", "rughe fronte", "rughe espressione", "zampe di gallina"],
    "lifting": ["lifting", "lifting viso", "ringiovanire viso", "cedimento cutaneo", "tensionamento"],
    "liposuzione": ["liposuzione", "togliere grasso", "pancia", "fianchi", "aderenza addominale", "grasso localizzato", "liposcultura"],
    "mastoplastica": ["mastoplastica", "seno", "protesi seno", "aumento seno", "riduzione seno", "tette", "petto"],
    "peeling": ["peeling", "pelle rugosa", "macchie pelle", "acne", "cicatrici acne", "rinnovamento pelle"],
    "laser": ["laser", "laser co2", "rimozione macchie", "ringiovanimento laser"],
    "prp": ["prp", "plasma ricco piastrine", "biorivitalizzazione", "ricrescita capelli"],
    "addominoplastica": ["addominoplastica", "pancia flaccida", "rimuovere pelle pancia", "diastasi"],
    "brachioplastica": ["brachioplastica", "lifting braccia", "braccia flaccide"],
    "cruroplastica": ["cruroplastica", "lifting cosce", "cosce flaccide"],
    "gluteoplastica": ["gluteoplastica", "lifting glutei", "glutei cadenti", "lifting sedere"],
    "otoplastica": ["otoplastica", "orecchie a sventola", "correggere orecchie"],
    "mentoplastica": ["mentoplastica", "mento", "rimodellare mento", "mento piccolo"],
    "bichectomia": ["bichectomia", "guance", "rimuovere grasso guance", "viso affusolato"]
  };
  
  const found = new Set();
  for (const [service, keys] of Object.entries(synonyms)) {
    for (const key of keys) {
      if (q.includes(key) || words.some(w => key.includes(w) && w.length > 3)) {
        found.add(service);
        break;
      }
    }
  }
  
  for (const service of Object.keys(synonyms)) {
    if (q.includes(service)) {
      found.add(service);
    }
  }
  
  return { services: Array.from(found) };
}

function Marketplace({uiState,onBook,onView}){
  var _searchState=useState("");var search=_searchState[0];var setSearch=_searchState[1];
  var _tagsState=useState([]);var tags=_tagsState[0];var setTags=_tagsState[1];
  var _cityState=useState(null);var city=_cityState[0];var setCity=_cityState[1];
  var _dbDoctorsState=useState([]);var dbDoctors=_dbDoctorsState[0];var setDbDoctors=_dbDoctorsState[1];
  var _loadingDocsState=useState(true);var loadingDocs=_loadingDocsState[0];var setLoadingDocs=_loadingDocsState[1];
  var _aiTermsState=useState(null);var aiTerms=_aiTermsState[0];var setAiTerms=_aiTermsState[1];
  var _aiLoadingState=useState(false);var aiLoading=_aiLoadingState[0];var setAiLoading=_aiLoadingState[1];
  var _aiLabelState=useState(null);var aiLabel=_aiLabelState[0];var setAiLabel=_aiLabelState[1];
  var searchTimerRef=useRef(null);

  // Carica medici dal DB
  useEffect(function(){
    var fetchDoctors=async function(){
      setLoadingDocs(true);
      var dpRes=await sb.from("doctor_profiles")
        .select("*, profile:profiles!doctor_profiles_id_fkey(id,name,city)")
        .eq("available",true);
      var locRes=await sb.from("doctor_locations").select("*");
      var allLocations=(!locRes.error&&locRes.data)?locRes.data:[];

      if(!dpRes.error&&dpRes.data&&dpRes.data.length>0){
        var expanded=[];
        dpRes.data.forEach(function(d){
          var colors=["#c8a96e","#2dc889","#e06b4a","#5b8dee","#9b7fd4"];
          var name=d.profile?d.profile.name:"Medico";
          var ini=name.split(" ").map(function(n){return n[0];}).join("").slice(0,2).toUpperCase();
          var docLocs=allLocations.filter(function(l){return l.doctor_id===d.id;});
          var base={
            id:d.id,
            supabase_id:d.id,
            name:name,
            specialty:d.specialty||"Medicina Estetica",
            rating:4.8,
            reviews:0,
            price:d.price||100,
            initials:ini,
            services:d.services||[],
            bio:d.bio||"",
            available:d.available,
            tags:d.tags||[],
            accent:colors[name.length%colors.length],
            photo_url:d.photo_url||null,
            cover_url:d.cover_url||null,
            locations:docLocs,
          };
          var mainCity=d.profile?d.profile.city:"";
          var allCities=mainCity?[mainCity]:[];
          docLocs.forEach(function(loc){
            if(loc.city&&!allCities.includes(loc.city)) allCities.push(loc.city);
          });
          if(allCities.length===0) allCities=["Italia"];
          expanded.push(Object.assign({},base,{
            city:allCities[0],
            allCities:allCities,
            id:d.id,
            supabase_id:d.id,
          }));
        });
        setDbDoctors(expanded);
      }else{
        setDbDoctors(DOCTORS);
      }
      setLoadingDocs(false);
    };
    fetchDoctors();
  },[]);

  useEffect(function(){
    if(uiState.filterTags&&uiState.filterTags.length>0) setTags(uiState.filterTags);
    if(uiState.filterCity) setCity(uiState.filterCity);
  },[uiState.filterTags,uiState.filterCity]);

  var allDocs=dbDoctors.length>0?dbDoctors:DOCTORS;
  var allServices=Object.values(TAXONOMY).flatMap(function(t){return t.services;});

  // AI semantic search (ricerca intelligente)
  useEffect(function(){
    if(searchTimerRef.current) clearTimeout(searchTimerRef.current);
    setAiTerms(null);setAiLabel(null);
    if(!search||search.length<3) return;
    var directMatch=allDocs.some(function(d){
      var q=search.toLowerCase();
      return d.name.toLowerCase().includes(q)||d.specialty.toLowerCase().includes(q)||(d.services||[]).some(function(s){return s.toLowerCase().includes(q);})||(d.allCities||[]).some(function(c){return c&&c.toLowerCase().includes(q);});
    });
    if(directMatch) return;
    searchTimerRef.current=setTimeout(function(){
      var result=semanticSearch(search);
      if(result.services.length>0){setAiTerms(result.services);setAiLabel(result.services[0]);}
      else{setAiTerms([]);setAiLabel(null);}
      setAiLoading(false);
    },200);
  },[search,allDocs]);
  
  var allTags=[...new Set(allDocs.flatMap(function(d){return d.tags;}))];
  var filtered=allDocs.filter(function(d){
    var q=search.toLowerCase();
    var cities=d.allCities||[d.city];
    if(aiTerms&&aiTerms.length>0){
      var matchesAI=aiTerms.some(function(t){
        var tLow=t.toLowerCase();
        var tWords=tLow.split(" ");
        return d.services.some(function(s){
          var sLow=s.toLowerCase();
          var sWords=sLow.split(" ");
          return sLow.includes(tLow)||tLow.includes(sLow)||
            tWords.some(function(w){return w.length>3&&sLow.includes(w);})||
            sWords.some(function(w){return w.length>3&&tLow.includes(w);});
        });
      });
      var matchesCity=!city||cities.some(function(c){return c&&c.toLowerCase().includes(city.toLowerCase());});
      return matchesAI&&matchesCity;
    }
    var matchesSearch=!q||d.name.toLowerCase().includes(q)||d.services.some(function(s){return s.toLowerCase().includes(q);})||d.specialty.toLowerCase().includes(q)||cities.some(function(c){return c&&c.toLowerCase().includes(q);});
    var matchesCity=!city||cities.some(function(c){return c&&c.toLowerCase().includes(city.toLowerCase());});
    var matchesTags=tags.length===0||tags.some(function(t){return d.tags.includes(t);});
    return matchesSearch&&matchesCity&&matchesTags;
  });
  var hl=uiState.highlightedDoctorIds||[];
  var sorted=[...filtered].sort(function(a,b){return (hl.includes(b.id)?1:0)-(hl.includes(a.id)?1:0);});

  return(
    <div style={{height:"100%",overflow:"hidden",display:"flex",flexDirection:"column"}}>
      {uiState.contextNote&&<div className="fade-in" style={{padding:"8px 20px",background:"linear-gradient(90deg,var(--gold-light),transparent)",borderBottom:"1px solid rgba(200,169,110,0.12)",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <span style={{fontSize:11,color:"var(--gold)"}}>✦</span><span style={{fontSize:11,color:"var(--text2)"}}>{uiState.contextNote}</span>
        <button onClick={()=>{setTags([]);setCity(null);}} style={{marginLeft:"auto",fontSize:10,color:"var(--text3)",background:"none",border:"none",cursor:"pointer"}}>✕ reset</button>
      </div>}
      <div className="hero-bg" style={{padding:"22px 22px 16px",flexShrink:0}}>
        <div className="fade-in" style={{marginBottom:14}}>
          <h1 className="serif" style={{fontSize:uiState.heroTitle?24:30,fontWeight:400,lineHeight:1.15,color:"var(--text)",marginBottom:4}}>{uiState.heroTitle||<>Il tuo viaggio verso<br/><em style={{color:"var(--gold)"}}>la versione migliore</em></>}</h1>
          <p style={{fontSize:12,color:"var(--text2)"}}>{uiState.heroSubtitle||"Trova il professionista giusto guidato da Gloria."}</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:"var(--radius-lg)",padding:"9px 13px",marginBottom:11}}>
          <svg width="13" height="13" fill="none" stroke="var(--text3)" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input value={search} onChange={function(e){return setSearch(e.target.value);}} placeholder="Di quale servizio hai bisogno o trova un medico..." style={{flex:1,background:"transparent",border:"none",fontSize:12,color:"var(--text)",caretColor:"var(--gold)"}}/>
          {(search||tags.length>0||city)&&<button onClick={()=>{setSearch("");setTags([]);setCity(null);setAiTerms(null);setAiLabel(null);}} style={{fontSize:10,color:"var(--text3)",background:"none",border:"none",cursor:"pointer"}}>✕</button>}
          {aiLoading&&<span style={{fontSize:10,color:"var(--gold)"}}>✦ Gloria sta cercando...</span>}
        </div>
        {aiTerms&&aiLabel&&!aiLoading&&(
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:"var(--radius)",background:"rgba(200,169,110,0.08)",border:"1px solid rgba(200,169,110,0.2)",marginBottom:8}}>
            <span style={{fontSize:11,color:"var(--gold)"}}>✦ Gloria ha capito:</span>
            <span style={{fontSize:11,fontWeight:700,color:"var(--gold)"}}>{aiLabel}</span>
            <button onClick={function(){setAiTerms(null);setAiLabel(null);}} style={{marginLeft:"auto",fontSize:9,color:"var(--text3)",background:"none",border:"none",cursor:"pointer"}}>✕ Cerca normale</button>
          </div>
        )}
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {allTags.map(function(t){return <button key={t} onClick={function(){setTags(function(prev){return prev.includes(t)?prev.filter(function(x){return x!==t;}):[...prev,t];});window.gloriaTrack("filter_tag",{tag:t});}} className={"filter-chip"+(tags.includes(t)?" active":"")}>{t}</button>;})}
          {city&&<button onClick={()=>setCity(null)} className="filter-chip active" style={{borderColor:"var(--teal)",color:"var(--teal)",background:"var(--teal-dim)"}}>📍 {city} ✕</button>}
        </div>
        {(search||tags.length>0)&&(
          <div className="fade-in" style={{display:"flex",gap:8,alignItems:"center",background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:"var(--radius-lg)",padding:"9px 13px",marginTop:8}}>
            <span style={{fontSize:13}}>📍</span>
            <input
              value={city||""}
              onChange={function(e){setCity(e.target.value||null);}}
              placeholder="In quale città?"
              style={{flex:1,background:"transparent",border:"none",fontSize:12,color:"var(--text)",caretColor:"var(--gold)",outline:"none"}}/>
            {city&&<button onClick={function(){setCity(null);}} style={{fontSize:10,color:"var(--text3)",background:"none",border:"none",cursor:"pointer"}}>✕</button>}
          </div>
        )}
      </div>
      <div style={{padding:"7px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid var(--border)",flexShrink:0}}>
        <span style={{fontSize:11,color:"var(--text3)"}}>
          {loadingDocs?"Caricamento...":(<><span style={{color:"var(--text)",fontWeight:600}}>{sorted.length}</span> professionisti{tags.length>0&&<span style={{color:"var(--gold)"}}> · filtrati da Gloria</span>}</>)}
        </span>
        {hl.length>0&&<div className="gloria-badge">✦ Gloria ha selezionato {hl.length}</div>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"13px 16px"}}>
        {loadingDocs?(
          <div style={{textAlign:"center",padding:"3rem"}}><p style={{color:"var(--text3)",fontSize:12}}>Caricamento professionisti...</p></div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:11}}>
            {sorted.map(function(d){return <DoctorCard key={d.id} doc={d} hl={hl.includes(d.id)} onBook={onBook} onView={onView}/>;} )}
            {sorted.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"4rem 2rem"}}><p style={{fontSize:28,marginBottom:8}}>🔍</p><p style={{color:"var(--text2)",fontSize:13}}>Nessun professionista trovato.</p></div>}
          </div>
        )}
      </div>
    </div>
  );
}


function Gloria({onUpdate,ctx="marketplace",doctors}){
  const MSG0={
    marketplace:"Ciao! Sono Gloria ✦\nSono qui per aiutarti a trovare il professionista giusto. Di cosa hai bisogno?",
    doctor:"Ciao! Sono Gloria ✦\nCome posso supportarti nella gestione del tuo studio?",
    patient:"Ciao! Sono Gloria ✦\nHai domande sui tuoi appuntamenti o cerchi nuovi trattamenti?",
  };
  const SUGG0={
    marketplace:["Cerco qualcosa per il viso","Voglio capire i costi","Trattamenti non invasivi"],
    doctor:["Appuntamenti di oggi","Ottimizza il mio profilo","Statistiche del mese"],
    patient:["Prossimo appuntamento","Cerca trattamenti viso","Medici preferiti"],
  };

  var _msgsState=useState([{role:"assistant",content:MSG0[ctx]||MSG0.marketplace}]);var msgs=_msgsState[0];var setMsgs=_msgsState[1];
  var _inputState=useState("");var input=_inputState[0];var setInput=_inputState[1];
  var _loadingState=useState(false);var loading=_loadingState[0];var setLoading=_loadingState[1];
  var _suggState=useState(SUGG0[ctx]||SUGG0.marketplace);var sugg=_suggState[0];var setSugg=_suggState[1];
  var _intentState=useState("");var intent=_intentState[0];var setIntent=_intentState[1];
  var _cityState=useState("");var city=_cityState[0];var setCity=_cityState[1];
  var _budgetState=useState("");var budget=_budgetState[0];var setBudget=_budgetState[1];
  var _realDoctorsState=useState([]);var realDoctors=_realDoctorsState[0];var setRealDoctors=_realDoctorsState[1];

  // Carica medici reali dal DB per il contesto di Gloria
  useEffect(function(){
    if(ctx!=="marketplace") return;
    var loadDocs=async function(){
      var dpRes=await sb.from("doctor_profiles")
        .select("*, profile:profiles!doctor_profiles_id_fkey(id,name,city)")
        .eq("available",true);
      var locRes=await sb.from("doctor_locations").select("*");
      var allLocs=(!locRes.error&&locRes.data)?locRes.data:[];
      if(!dpRes.error&&dpRes.data&&dpRes.data.length>0){
        var mapped=dpRes.data.map(function(d){
          var name=d.profile?d.profile.name:"Medico";
          var docLocs=allLocs.filter(function(l){return l.doctor_id===d.id;});
          var mainCity=d.profile?d.profile.city:"";
          var allCities=mainCity?[mainCity]:[];
          docLocs.forEach(function(l){if(l.city&&!allCities.includes(l.city))allCities.push(l.city);});
          return {
            name:name,
            specialty:d.specialty||"Medicina Estetica",
            city:allCities.join(", "),
            price:d.price||100,
            services:d.services||[],
          };
        });
        setRealDoctors(mapped);
      }
    };
    loadDocs();
  },[ctx]);

  const viewedDocs=useRef([]);
  const viewedTags=useRef([]);
  const proactTimer=useRef(null);
  const ref=useRef(null);
  const inputRef=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs,loading]);

  const RECS={
    rinoplastica:{ids:[1,6],tags:["viso","chirurgia"],hero:"Specialisti in rinoplastica",sub:"Chirurghi del naso con esperienza internazionale"},
    blefaroplastica:{ids:[1,6],tags:["viso","chirurgia"],hero:"Specialisti in blefaroplastica",sub:"Chirurghi esperti nella zona perioculare"},
    filler:{ids:[2,5],tags:["viso","non-invasivo"],hero:"Specialisti in filler",sub:"Medici estetici per risultati naturali e duraturi"},
    botox:{ids:[2,5],tags:["viso","non-invasivo"],hero:"Specialisti in botox",sub:"Medici estetici che privilegiano l'effetto naturale"},
    lifting:{ids:[1,4],tags:["viso","chirurgia"],hero:"Specialisti in lifting",sub:"Chirurghi con tecniche mininvasive e recupero rapido"},
    liposuzione:{ids:[4,1],tags:["corpo","chirurgia"],hero:"Specialisti in liposuzione",sub:"Chirurghi plastici per la scultura del corpo"},
    mastoplastica:{ids:[4],tags:["seno","chirurgia"],hero:"Specialisti in mastoplastica",sub:"Chirurghi plastici con massima esperienza"},
    peeling:{ids:[3,2],tags:["pelle","non-invasivo"],hero:"Specialisti per la pelle",sub:"Dermatologi estetici con approccio personalizzato"},
    viso_gen:{ids:[2,5,1],tags:["viso"],hero:"Specialisti per il viso",sub:"I professionisti piu apprezzati per trattamenti viso"},
    corpo_gen:{ids:[4,1],tags:["corpo","chirurgia"],hero:"Specialisti per il corpo",sub:"Chirurghi plastici per trattamenti corporei"},
  };
  const INTENT_NOTES={
    rinoplastica:"Il Dr. Esposito ha oltre 1.000 interventi al naso, la Dr.ssa Marchetti e apprezzata per i risultati naturali.",
    blefaroplastica:"Chirurghi con alta specializzazione nella zona perioculare, massima attenzione all'espressivita.",
    filler:"Approccio conservativo e risultati naturali, ideali anche per chi si avvicina per la prima volta.",
    botox:"Entrambi privilegiano un effetto naturale che preserva la tua espressivita.",
    lifting:"Tecnica mininvasiva, cicatrici praticamente invisibili e tempi di recupero ridotti.",
    liposuzione:"Tecnica di precisione, risultati definiti e naturali, grande cura del post-operatorio.",
    mastoplastica:"Il Dr. Bruno ha oltre 200 interventi, docente universitario, massima attenzione alla naturalezza.",
    peeling:"La Dr.ssa Ricci usa protocolli personalizzati per ogni tipo di pelle con approccio olistico.",
    viso_gen:"Professionisti apprezzati per il viso — apri i profili per capire chi senti piu vicino al tuo ideale.",
    corpo_gen:"Chirurghi plastici con tecniche mininvasive e grande cura del percorso post-operatorio.",
  };

  var detectIntent=function(lo){
    if(lo.includes("rinoplastica")||lo.includes("naso")||lo.includes("rifarmi il naso")||lo.includes("naso storto")||lo.includes("setto")) return "rinoplastica";
    if(lo.includes("blefaroplastica")||lo.includes("palpebre")||lo.includes("occhi stanchi")||lo.includes("occhiaie")) return "blefaroplastica";
    if(lo.includes("filler")||lo.includes("labbra")||lo.includes("acido ialuronico")||lo.includes("volumizzare")||lo.includes("bocca")) return "filler";
    if(lo.includes("botox")||lo.includes("rughe")||lo.includes("fronte")||lo.includes("espressione")||lo.includes("invecchiamento")) return "botox";
    if(lo.includes("lifting")||lo.includes("cedimento")||lo.includes("ringiovanire")||lo.includes("ringiovanimento")) return "lifting";
    if(lo.includes("liposuzione")||lo.includes("grasso")||lo.includes("pancia")||lo.includes("fianchi")||lo.includes("cellulite")||lo.includes("cosce")||lo.includes("glutei")||lo.includes("sedere")||lo.includes("culo")||lo.includes("dimagrire")) return "liposuzione";
    if(lo.includes("seno")||lo.includes("mastoplastica")||lo.includes("petto")||lo.includes("protesi")||lo.includes("tette")||lo.includes("schiacciate")||lo.includes("rifar")||lo.includes("impianto")) return "mastoplastica";
    if(lo.includes("peeling")||lo.includes("acne")||lo.includes("macchie")||lo.includes("dermatologo")||lo.includes("pelle")||lo.includes("brufoli")||lo.includes("cicatrici")||lo.includes("rossore")) return "peeling";
    if(lo.includes("viso")||lo.includes("faccia")||lo.includes("zigomi")||lo.includes("mento")||lo.includes("guance")) return "viso_gen";
    if(lo.includes("corpo")||lo.includes("addome")||lo.includes("gambe")||lo.includes("braccia")) return "corpo_gen";
    return "";
  };
  var detectCity=function(lo){
    if(lo.includes("milano")) return "Milano";
    if(lo.includes("roma")) return "Roma";
    if(lo.includes("torino")) return "Torino";
    if(lo.includes("napoli")) return "Napoli";
    if(lo.includes("firenze")) return "Firenze";
    return "";
  };
  var detectBudget=function(lo){
    if(lo.includes("fino a 100")||lo.includes("economico")||lo.includes("poco")||lo.includes("basso")) return "low";
    if(lo.includes("200 o piu")||lo.includes("500")||lo.includes("nessun limite")||lo.includes("non e un problema")) return "high";
    if(lo.includes("100")||lo.includes("200")||lo.includes("medio")) return "mid";
    return "";
  };

  var pushProactive=useCallback(function(message,chips,ui){
    setMsgs(function(prev){
      var last=prev[prev.length-1];
      if(last&&last.role==="assistant"&&last.proactive) return prev;
      return [...prev,{role:"assistant",content:message,proactive:true}];
    });
    if(chips&&chips.length) setSugg(chips);
    if(ui&&Object.keys(ui).length) onUpdate(ui);
  },[onUpdate]);

  useEffect(function(){
    if(ctx!=="marketplace") return;
    var handler=function(ev){
      if(proactTimer.current) clearTimeout(proactTimer.current);
      if(ev.type==="view_card"){
        var doc=ev.data.doc;
        if(!viewedDocs.current.find(function(d){return d.id===doc.id;}))
          viewedDocs.current=[...viewedDocs.current,doc];
        var tagCount={};
        viewedDocs.current.forEach(function(d){
          d.tags.forEach(function(t){tagCount[t]=(tagCount[t]||0)+1;});
        });
        var topTag=Object.keys(tagCount).sort(function(a,b){return tagCount[b]-tagCount[a];})[0];
        if(tagCount[topTag]>=2){
          proactTimer.current=setTimeout(function(){
            var tagLabels={"viso":"trattamenti viso","non-invasivo":"medicina estetica non invasiva","chirurgia":"chirurgia estetica","corpo":"chirurgia del corpo","pelle":"dermatologia estetica","seno":"chirurgia del seno"};
            var lbl=tagLabels[topTag]||topTag;
            pushProactive(
              "Sto notando che esplori molto profili di "+lbl+" ✦\nVuoi che affini la selezione? Dimmi la tua citta e il budget e costruisco una lista personalizzata.",
              ["Si, aiutami a scegliere","Qual e il migliore?","Dimmi i prezzi"],
              {}
            );
          },3000);
        }
      }
      if(ev.type==="book_click"){
        var d=ev.data.doc;
        proactTimer.current=setTimeout(function(){
          pushProactive(
            "Ottima scelta — "+d.name+" e tra i piu apprezzati ✦\nLa prima visita parte da €"+d.price+". Procedi con fiducia: e il momento per fare tutte le domande che hai in mente!",
            ["Cosa chiedere alla prima visita","Quali documenti portare"],
            {}
          );
        },600);
      }
      if(ev.type==="modal_book"){
        var mb=ev.data.doc;
        proactTimer.current=setTimeout(function(){
          pushProactive(
            "Perfetto ✦ Stai per prenotare con "+mb.name+".\nDopo la conferma potrai chattare direttamente con lo studio per qualsiasi dettaglio pre-visita.",
            ["Cosa aspettarsi dalla prima visita","Torna al marketplace"],
            {}
          );
        },500);
      }
      if(ev.type==="modal_tab"&&ev.data.tab==="portfolio"){
        var pDoc=ev.data.doc;
        proactTimer.current=setTimeout(function(){
          pushProactive(
            "Stai guardando il portfolio di "+pDoc.name.split(" ").slice(-1)[0]+" ✦\nLe foto prima/dopo sono uno degli indicatori piu affidabili della qualita di un chirurgo. Valuta la naturalezza dei risultati.",
            ["Come valutare un portfolio","Prenota una consulenza","Vedi altri profili"],
            {}
          );
        },2500);
      }
      if(ev.type==="modal_tab"&&ev.data.tab==="dove"){
        var dDoc=ev.data.doc;
        proactTimer.current=setTimeout(function(){
          pushProactive(
            "Stai verificando dove opera "+dDoc.name.split(" ").slice(-1)[0]+". Se la distanza e un problema posso mostrarti professionisti nella tua citta.",
            ["Mostrami medici vicino a me","La distanza va bene"],
            {}
          );
        },1800);
      }
      if(ev.type==="filter_tag"){
        viewedTags.current=[...viewedTags.current,ev.data.tag];
        if(viewedTags.current.length>=2){
          proactTimer.current=setTimeout(function(){
            pushProactive(

function MapView({locations,height}){
  var mapIdRef=useRef("map-"+Math.random().toString(36).slice(2));
  var mapInstanceRef=useRef(null);

  useEffect(function(){
    if(!locations||locations.length===0) return;
    if(typeof L==="undefined") return;
    var timer=setTimeout(function(){
      var el=document.getElementById(mapIdRef.current);
      if(!el) return;
      if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;}
      mapInstanceRef.current=L.map(el,{zoomControl:true,scrollWheelZoom:false});
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>",maxZoom:19,crossOrigin:true}).addTo(mapInstanceRef.current);
      var map=mapInstanceRef.current;
      var pin=async function(loc){
        var q=loc.address?loc.address+", "+loc.city:loc.city+", Italia";
        try{
          var q=loc.address?loc.address+", "+loc.city:loc.city+", Italia";
          var r=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(q),{headers:{"Accept-Language":"it","User-Agent":"GlowUp-App/1.0 glowupdemo.netlify.app"}});
          var d=await r.json();
          if(d&&d.length>0){
            var lat=parseFloat(d[0].lat),lon=parseFloat(d[0].lon);
            var ico=L.divIcon({className:"",html:'<div style="width:18px;height:18px;background:#c8a96e;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.35)"></div>',iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-12]});
            L.marker([lat,lon],{icon:ico}).addTo(map).bindPopup("<strong>"+loc.name+"</strong><br>"+loc.city+(loc.address?"<br>"+loc.address:""));
            return [lat,lon];
          }
        }catch(e){}
        return null;
      };
      var load=async function(){
        var coords=[];
        for(var i=0;i<locations.length;i++){
          var loc=locations[i];
          // Usa coordinate salvate se disponibili, altrimenti geocoding
          if(loc.lat&&loc.lon){
            var lat=loc.lat,lon=loc.lon;
            var ico=L.divIcon({className:"",html:'<div style="width:18px;height:18px;background:#c8a96e;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.35)"></div>',iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-12]});
            L.marker([lat,lon],{icon:ico}).addTo(map).bindPopup("<strong>"+loc.name+"</strong><br>"+loc.city+(loc.address?"<br>"+loc.address:""));
            coords.push([lat,lon]);
          }else{
            var c=await pin(loc);
            if(c)coords.push(c);
            if(i<locations.length-1) await new Promise(function(r){setTimeout(r,1100);});
          }
        }
        if(coords.length===1) map.setView(coords[0],14);
        else if(coords.length>1) map.fitBounds(coords,{padding:[30,30]});
        setTimeout(function(){map.invalidateSize();},100);
      };
      load().then(function(){if(mapInstanceRef.current)mapInstanceRef.current.invalidateSize();});
    },500);
    return function(){clearTimeout(timer);};
  },[locations]);

  useEffect(function(){
    return function(){if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;}};
  },[]);

  return <div id={mapIdRef.current} style={{width:"100%",height:height||220,borderRadius:"var(--radius-lg)",overflow:"hidden",border:"1px solid var(--border)",marginBottom:"1rem",zIndex:1}}/>;
}
